<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konsinyasi Tracker - PT Philo Teknik</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{
  --bg:#0f1117;--card:#1a1d27;--card2:#21242f;--border:#2a2d3a;
  --accent:#3b82f6;--accent-d:#1e3a5f;
  --green:#22c55e;--green-d:#14532d;
  --amber:#f59e0b;--amber-d:#78350f;
  --red:#ef4444;--red-d:#7f1d1d;
  --txt:#e2e8f0;--txt2:#94a3b8;--txt3:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}
.hdr-s{font-size:11px;color:var(--txt2)}
.tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--txt3);transition:.15s;font-family:inherit}
.tab.on{background:var(--accent);color:#fff}
.tab:hover:not(.on){color:var(--txt)}
.wrap{padding:20px;max-width:1200px;margin:0 auto}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.sc{background:var(--card);border-radius:10px;padding:16px 20px;border:1px solid var(--border);flex:1;min-width:140px}
.sc-l{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums}
.sc-s{font-size:11px;color:var(--txt3);margin-top:2px}
.pnl{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:20px;margin-bottom:16px}
.pnl-t{font-size:15px;font-weight:700;margin-bottom:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:var(--txt3);font-weight:600;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tr-h:hover td{background:var(--card2)}
.r{text-align:right}.b{font-weight:600}.nw{white-space:nowrap}
.ell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block}
.bg-b{background:var(--accent-d);color:var(--accent)}
.bg-g{background:var(--green-d);color:var(--green)}
.bg-a{background:var(--amber-d);color:var(--amber)}
.bg-r{background:var(--red-d);color:var(--red)}
.btn{border:none;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px}
.btn:hover{opacity:.85}
.btn-p{background:var(--accent);color:#fff}
.btn-g{background:transparent;color:var(--txt2);border:1px solid var(--border)}
.btn-d{background:var(--red-d);color:var(--red)}
.tb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{flex:1;min-width:140px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
.tb select option{background:var(--card)}
.mh{font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--accent-d)}
.pw{width:100px}.pb{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .3s}
.pl{font-size:10px;color:var(--txt3);margin-top:2px}
.exp-row td{background:var(--card2);padding:12px 16px}
.ds{margin-bottom:12px}.ds:last-child{margin-bottom:0}
.dt{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.dtb{width:100%;font-size:11px;border-collapse:collapse}
.dtb th{padding:4px 8px;font-size:10px;border-bottom:1px solid var(--border);color:var(--txt3)}
.dtb td{padding:4px 8px;border-bottom:1px solid var(--border)}
.de{font-size:11px;color:var(--txt3);font-style:italic;padding:4px 0}
.eb{cursor:pointer;user-select:none;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:10px;background:var(--card2);color:var(--txt2);border:1px solid var(--border);transition:.15s}
.eb:hover{background:var(--accent-d);color:var(--accent)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:var(--card);border-radius:12px;padding:24px;width:460px;max-width:92vw;border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.md h3{margin-bottom:16px;font-size:16px}
.fd{margin-bottom:12px}
.fd label{font-size:12px;color:var(--txt2);display:block;margin-bottom:4px}
.fd input,.fd select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:13px;font-family:inherit;outline:none}
.fd-h{font-size:11px;color:var(--txt3);margin-top:2px}
.srw{position:relative}
.srl{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:10}
.sri{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.sri:hover{background:var(--card2)}
.sri .c{font-weight:600;color:var(--txt)}.sri .d{color:var(--txt3);font-size:11px;margin-left:6px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.dc{display:inline-flex;align-items:center;gap:4px;background:var(--red-d);border:1px solid var(--red);border-radius:6px;padding:2px 4px}
.dc .btn{font-size:11px;padding:3px 8px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;animation:sU .3s ease}
.toast-ok{background:var(--green-d);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.toast-err{background:var(--red-d);color:var(--red);border:1px solid rgba(239,68,68,.25)}
@keyframes sU{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{text-align:center;padding:40px;color:var(--txt3)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:24px;color:var(--txt3);font-size:13px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:640px){.hdr{flex-direction:column;align-items:flex-start}.sc-v{font-size:20px}.sc{min-width:100px}}
</style>
</head>
<body>
<div class="hdr">
  <div><div class="hdr-t">Konsinyasi Tracker</div><div class="hdr-s">PT Philo Teknik → PT Yanmar Diesel Indonesia</div></div>
  <div class="tabs" id="tabs">
    <button class="tab on" data-t="dashboard" onclick="go('dashboard')">◉ Dashboard</button>
    <button class="tab" data-t="requests" onclick="go('requests')">📋 Request</button>
    <button class="tab" data-t="items" onclick="go('items')">📦 Ringkasan</button>
  </div>
</div>
<div class="wrap" id="app"><div class="loading"><div class="spinner"></div><br>Memuat data...</div></div>
<div id="mr"></div>
<script>
const SU='https://epmwxihwftcjgqqpzkme.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbXd4aWh3ZnRjamdxcXB6a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzg5MzAsImV4cCI6MjA5MDUxNDkzMH0.R8nyhlNq4adtWkeAuvXQJoXYA1WKrauUihkjvmZ8LDw';
const db=supabase.createClient(SU,SK);
let S={tab:'dashboard',items:[],requests:[],shipments:[],billings:[],search:'',fM:'all',exp:{},loading:true,modal:null,dc:null};

async function load(){S.loading=true;render();try{const[a,b,c,d]=await Promise.all([db.from('items').select('*').order('code'),db.from('requests').select('*').order('month').order('id'),db.from('shipments').select('*').order('ship_date'),db.from('billings').select('*').order('id')]);S.items=a.data||[];S.requests=b.data||[];S.shipments=c.data||[];S.billings=d.data||[]}catch(x){toast(x.message,'err')}S.loading=false;render()}

function rqS(){return S.requests.map(r=>{const sh=S.shipments.filter(s=>s.request_id===r.id).reduce((a,s)=>a+s.qty,0),bl=S.billings.filter(b=>b.request_id===r.id).reduce((a,b)=>a+b.qty,0),it=S.items.find(i=>i.code===r.item_code);return{...r,desc:it?.description||r.item_code,tS:sh,sR:r.qty_requested-sh,tB:bl,bT:sh-bl}})}
function itS(){const rs=rqS();return S.items.map(i=>{const rr=rs.filter(r=>r.item_code===i.code);return{...i,tReq:rr.reduce((a,r)=>a+r.qty_requested,0),tShip:rr.reduce((a,r)=>a+r.tS,0),tBill:rr.reduce((a,r)=>a+r.tB,0),bT:rr.reduce((a,r)=>a+r.tS,0)-rr.reduce((a,r)=>a+r.tB,0),mos:[...new Set(rr.map(r=>r.month))]}}).filter(i=>i.tReq>0)}
function aM(){return[...new Set(S.requests.map(r=>r.month))].sort()}
function fm(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][parseInt(mo)]+' '+y}
function $(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function go(t){S.tab=t;S.search='';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render()}
function toast(m,t='ok'){const el=document.createElement('div');el.className=`toast toast-${t}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
function tog(id){S.exp[id]=!S.exp[id];render()}
function askD(t,id){S.dc={t,id};render()}
function canD(){S.dc=null;render()}
async function doD(t,id){if(t==='requests'){await db.from('shipments').delete().eq('request_id',id);await db.from('billings').delete().eq('request_id',id)}const{error}=await db.from(t).delete().eq('id',id);if(error){toast(error.message,'err');return}S.dc=null;toast('Dihapus');await load()}

function openM(t,d,eid){S.modal={t,d,eid:eid||null,is:'',sl:false};rM()}
function closeM(){S.modal=null;document.getElementById('mr').innerHTML=''}
function uM(k,v){S.modal.d[k]=v;rM()}

async function saveM(){
  const{t,d,eid}=S.modal;let err;
  if(t==='item'){
    if(!d.code||!d.description){toast('Isi semua field','err');return}
    if(eid)({error:err}=await db.from('items').update({code:d.code.toUpperCase(),description:d.description.toUpperCase()}).eq('id',eid));
    else({error:err}=await db.from('items').insert({code:d.code.toUpperCase(),description:d.description.toUpperCase()}));
  }else if(t==='request'){
    if(!d.month||!d.item_code||d.qty_requested<=0){toast('Isi semua field','err');return}
    const o={request_number:d.request_number||null,month:d.month,item_code:d.item_code,end_stock:d.end_stock||0,qty_requested:d.qty_requested};
    if(eid)({error:err}=await db.from('requests').update(o).eq('id',eid));
    else({error:err}=await db.from('requests').insert(o));
  }else if(t==='shipment'){
    if(!d.request_id||!d.ship_date||!d.surat_jalan||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):req?.sR||0;
    if(d.qty>mx){toast(`Melebihi sisa (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:d.qty};
    if(eid)({error:err}=await db.from('shipments').update(o).eq('id',eid));
    else({error:err}=await db.from('shipments').insert(o));
  }else if(t==='billing'){
    if(!d.request_id||!d.po_number||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.bT+(S.billings.find(b=>b.id===eid)?.qty||0):req?.bT||0;
    if(d.qty>mx){toast(`Melebihi belum tertagih (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),po_number:d.po_number,qty:d.qty,billing_date:d.billing_date||null};
    if(eid)({error:err}=await db.from('billings').update(o).eq('id',eid));
    else({error:err}=await db.from('billings').insert(o));
  }
  if(err){toast(err.message,'err');return}
  toast(eid?'Diupdate':'Ditambahkan');closeM();await load();
}

function render(){
  const a=document.getElementById('app');
  if(S.loading){a.innerHTML='<div class="loading"><div class="spinner"></div><br>Memuat data...</div>';return}
  if(S.tab==='dashboard')rDash(a);else if(S.tab==='requests')rReq(a);else if(S.tab==='items')rIt(a);
}

function rDash(a){
  const rs=rqS(),tR=rs.reduce((a,r)=>a+r.qty_requested,0),tS=rs.reduce((a,r)=>a+r.tS,0),tB=rs.reduce((a,r)=>a+r.tB,0),bT=tS-tB;
  const pS=rs.filter(r=>r.sR>0).length,pB=rs.filter(r=>r.bT>0).length;
  const iS=itS().filter(i=>i.bT>0).sort((a,b)=>b.bT-a.bT).slice(0,8);
  const pR=rs.filter(r=>r.sR>0).sort((a,b)=>b.sR-a.sR);
  a.innerHTML=`<div class="stats">
    <div class="sc"><div class="sc-l">Total Diminta</div><div class="sc-v" style="color:var(--accent)">${tR.toLocaleString()}</div><div class="sc-s">pcs semua request</div></div>
    <div class="sc"><div class="sc-l">Total Dikirim</div><div class="sc-v" style="color:var(--green)">${tS.toLocaleString()}</div><div class="sc-s">${pS} belum lengkap</div></div>
    <div class="sc"><div class="sc-l">Tertagih</div><div class="sc-v" style="color:var(--amber)">${tB.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-l">Belum Tertagih</div><div class="sc-v" style="color:${bT>0?'var(--red)':'var(--green)'}">${bT.toLocaleString()}</div><div class="sc-s">${pB} request</div></div>
  </div>
  <div class="pnl"><div class="pnl-t">Item Belum Tertagih Terbesar</div>
    ${iS.length===0?'<div class="empty">Semua sudah tertagih ✓</div>':iS.map(i=>{const p=i.tShip>0?Math.round(i.tBill/i.tShip*100):0;
      return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="flex:1;min-width:0"><div class="b" style="font-size:13px">${$(i.code)}</div><div style="font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${$(i.description)}</div></div>
        <div class="pw"><div class="pb"><div class="pf" style="width:${p}%;background:${p===100?'var(--green)':'var(--amber)'}"></div></div><div class="pl">${p}%</div></div>
        <div style="text-align:right;min-width:55px"><div style="font-size:15px;font-weight:700;color:var(--red)">${i.bT}</div><div style="font-size:10px;color:var(--txt3)">belum</div></div></div>`}).join('')}
  </div>
  <div class="pnl"><div class="pnl-t">Request Belum Lengkap</div>
    ${pR.length===0?'<div class="empty">Semua terpenuhi ✓</div>':pR.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap">
      <span class="bg bg-a">${fm(r.month)}</span>
      <div style="flex:1;min-width:100px"><span class="b" style="font-size:13px">${$(r.item_code)}</span> <span style="font-size:11px;color:var(--txt2)">${$(r.desc)}</span></div>
      <div style="text-align:right"><span style="color:var(--amber);font-weight:600">Sisa ${r.sR}</span><span style="font-size:11px;color:var(--txt3)"> / ${r.qty_requested}</span></div>
      <button class="btn btn-p" onclick="openM('shipment',{request_id:${r.id},ship_date:'',surat_jalan:'',qty:0})">+ Kirim</button></div>`).join('')}
  </div>`;
}

function rReq(a){
  const rs=rqS(),mos=aM(),q=S.search.toLowerCase();
  const f=rs.filter(r=>(S.fM==='all'||r.month===S.fM)&&(!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||(r.request_number||'').toLowerCase().includes(q)));
  const g={};f.forEach(r=>{if(!g[r.month])g[r.month]=[];g[r.month].push(r)});
  a.innerHTML=`<div class="tb">
    <input placeholder="Cari kode / deskripsi / no. form..." value="${$(S.search)}" oninput="S.search=this.value;render()">
    <select onchange="S.fM=this.value;render()"><option value="all">Semua Bulan</option>${mos.map(m=>`<option value="${m}"${S.fM===m?' selected':''}>${fm(m)}</option>`).join('')}</select>
    <button class="btn btn-p" onclick="openM('request',{request_number:'',month:'',item_code:'',end_stock:0,qty_requested:0})">+ Request</button>
    <button class="btn btn-g" onclick="openM('shipment',{request_id:'',ship_date:'',surat_jalan:'',qty:0})">+ Kirim</button>
    <button class="btn btn-g" onclick="openM('billing',{request_id:'',po_number:'',qty:0,billing_date:''})">+ Tagih</button>
  </div>
  ${Object.entries(g).sort(([a],[b])=>a.localeCompare(b)).map(([mo,rqs])=>{
    const rn=rqs.find(r=>r.request_number)?.request_number;
    return`<div style="margin-bottom:20px"><div class="mh">${fm(mo)}${rn?' — '+$(rn):''}</div><div class="tw"><table>
    <thead><tr><th style="width:28px"></th><th>Item</th><th>Deskripsi</th><th class="r">Stok</th><th class="r">Minta</th><th class="r">Kirim</th><th class="r">Sisa</th><th class="r">Tagih</th><th class="r">Blm</th><th>Aksi</th></tr></thead>
    <tbody>${rqs.map(r=>{
      const x=S.exp[r.id],sh=S.shipments.filter(s=>s.request_id===r.id),bl=S.billings.filter(b=>b.request_id===r.id);
      const isD=S.dc&&S.dc.t==='requests'&&S.dc.id===r.id;
      return`<tr class="tr-h">
        <td><button class="eb" onclick="tog(${r.id})">${x?'▼':'▶'}</button></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--txt2)">${$(r.desc)}</td>
        <td class="r" style="color:var(--txt3)">${r.end_stock}</td><td class="r b">${r.qty_requested}</td>
        <td class="r" style="color:var(--green);font-weight:600">${r.tS}</td>
        <td class="r"><span class="bg ${r.sR>0?'bg-a':'bg-g'}">${r.sR}</span></td>
        <td class="r" style="color:var(--amber)">${r.tB}</td>
        <td class="r"><span class="bg ${r.bT>0?'bg-r':'bg-g'}">${r.bT}</span></td>
        <td class="nw">${isD?`<div class="dc"><span style="font-size:11px;color:var(--red)">Yakin?</span><button class="btn btn-d" onclick="doD('requests',${r.id})">Ya</button><button class="btn btn-g" onclick="canD()">Batal</button></div>`:`<div style="display:flex;gap:3px">
          ${r.sR>0?`<button class="btn btn-g" onclick="openM('shipment',{request_id:${r.id},ship_date:'',surat_jalan:'',qty:0})">+Kirim</button>`:''}
          ${r.bT>0?`<button class="btn btn-g" onclick="openM('billing',{request_id:${r.id},po_number:'',qty:0,billing_date:''})">+Tagih</button>`:''}
          <button class="btn btn-g" onclick="openM('request',{request_number:'${$(r.request_number||'')}',month:'${r.month}',item_code:'${$(r.item_code)}',end_stock:${r.end_stock},qty_requested:${r.qty_requested}},${r.id})">✎</button>
          <button class="btn btn-d" onclick="askD('requests',${r.id})">✕</button></div>`}</td>
      </tr>${x?`<tr class="exp-row"><td colspan="10">
        <div class="ds"><div class="dt">📦 Pengiriman (${sh.length})<button class="btn btn-p" style="margin-left:auto;font-size:11px;padding:2px 8px" onclick="openM('shipment',{request_id:${r.id},ship_date:'',surat_jalan:'',qty:0})">+</button></div>
          ${sh.length===0?'<div class="de">Belum ada pengiriman</div>':`<table class="dtb"><thead><tr><th>Tanggal</th><th>Surat Jalan</th><th class="r">Qty</th><th>Aksi</th></tr></thead><tbody>
            ${sh.map(s=>{const isDs=S.dc&&S.dc.t==='shipments'&&S.dc.id===s.id;
              return`<tr><td>${s.ship_date}</td><td>${$(s.surat_jalan)}</td><td class="r b">${s.qty}</td>
              <td class="nw">${isDs?`<div class="dc"><span style="font-size:10px;color:var(--red)">Yakin?</span><button class="btn btn-d" onclick="doD('shipments',${s.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<button class="btn btn-g" onclick="openM('shipment',{request_id:${r.id},ship_date:'${s.ship_date}',surat_jalan:'${$(s.surat_jalan)}',qty:${s.qty}},${s.id})">✎</button> <button class="btn btn-d" onclick="askD('shipments',${s.id})">✕</button>`}</td></tr>`}).join('')}</tbody></table>`}
        </div>
        <div class="ds"><div class="dt">💰 Penagihan (${bl.length})<button class="btn btn-p" style="margin-left:auto;font-size:11px;padding:2px 8px" onclick="openM('billing',{request_id:${r.id},po_number:'',qty:0,billing_date:''})">+</button></div>
          ${bl.length===0?'<div class="de">Belum ada penagihan</div>':`<table class="dtb"><thead><tr><th>No. PO</th><th>Tanggal</th><th class="r">Qty</th><th>Aksi</th></tr></thead><tbody>
            ${bl.map(b=>{const isDb=S.dc&&S.dc.t==='billings'&&S.dc.id===b.id;
              return`<tr><td class="b">${$(b.po_number)}</td><td>${b.billing_date||'-'}</td><td class="r b">${b.qty}</td>
              <td class="nw">${isDb?`<div class="dc"><span style="font-size:10px;color:var(--red)">Yakin?</span><button class="btn btn-d" onclick="doD('billings',${b.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<button class="btn btn-g" onclick="openM('billing',{request_id:${r.id},po_number:'${$(b.po_number)}',qty:${b.qty},billing_date:'${b.billing_date||''}'},${b.id})">✎</button> <button class="btn btn-d" onclick="askD('billings',${b.id})">✕</button>`}</td></tr>`}).join('')}</tbody></table>`}
        </div>
      </td></tr>`:''}`}).join('')}</tbody></table></div></div>`}).join('')}
  ${Object.keys(g).length===0?'<div class="empty">Tidak ada data</div>':''}`;
}

function rIt(a){
  const items=itS(),q=S.search.toLowerCase();
  const f=items.filter(i=>!q||i.code.toLowerCase().includes(q)||i.description.toLowerCase().includes(q)).sort((a,b)=>b.bT-a.bT);
  a.innerHTML=`<div class="tb">
    <input placeholder="Cari item..." value="${$(S.search)}" oninput="S.search=this.value;render()">
    <button class="btn btn-p" onclick="openM('item',{code:'',description:''})">+ Item Baru</button>
  </div><div class="tw"><table>
    <thead><tr><th>Item</th><th>Deskripsi</th><th class="r">Diminta</th><th class="r">Kirim</th><th class="r">Tagih</th><th class="r">Blm Tagih</th><th>Bulan</th></tr></thead>
    <tbody>${f.map(i=>`<tr class="tr-h"><td class="b nw">${$(i.code)}</td><td class="ell" style="color:var(--txt2)">${$(i.description)}</td>
      <td class="r b">${i.tReq}</td><td class="r" style="color:var(--green);font-weight:600">${i.tShip}</td><td class="r" style="color:var(--amber)">${i.tBill}</td>
      <td class="r"><span class="bg ${i.bT>0?'bg-r':'bg-g'}">${i.bT}</span></td>
      <td>${i.mos.map(m=>`<span class="bg bg-b" style="margin:1px">${fm(m)}</span>`).join(' ')}</td></tr>`).join('')}</tbody>
  </table></div>${f.length===0?'<div class="empty">Tidak ada item</div>':''}`;
}

function rM(){
  const root=document.getElementById('mr');
  if(!S.modal){root.innerHTML='';return}
  const{t,d,eid,is}=S.modal;const rs=rqS();let flds='';
  if(t==='item'){
    flds=`<div class="fd"><label>Kode Item</label><input value="${$(d.code)}" placeholder="JCR0065" oninput="uM('code',this.value)"></div>
          <div class="fd"><label>Deskripsi</label><input value="${$(d.description)}" oninput="uM('description',this.value)"></div>`;
  }else if(t==='request'){
    flds=`<div class="fd"><label>No. Form Request</label><input value="${$(d.request_number)}" placeholder="PTP/1/III/26 (opsional)" oninput="uM('request_number',this.value)"></div>
      <div class="fd"><label>Bulan</label><input type="month" value="${d.month}" onchange="uM('month',this.value)"></div>
      <div class="fd"><label>Item</label><div class="srw">
        <input value="${$(is||d.item_code)}" placeholder="Ketik kode/deskripsi..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${S.items.filter(i=>{const q=(is||'').toLowerCase();return!q||i.code.toLowerCase().includes(q)||i.description.toLowerCase().includes(q)}).slice(0,10).map(i=>`<div class="sri" onclick="S.modal.d.item_code='${$(i.code)}';S.modal.is='${$(i.code)}';S.modal.sl=false;rM()"><span class="c">${$(i.code)}</span><span class="d">${$(i.description)}</span></div>`).join('')||'<div class="sri" style="color:var(--txt3)">Tidak ditemukan</div>'}</div>`:''}</div>
        ${d.item_code?`<div class="fd-h">✓ ${$(d.item_code)}</div>`:''}</div>
      <div class="fd"><label>End Stock</label><input type="number" value="${d.end_stock}" onchange="uM('end_stock',parseInt(this.value)||0)"></div>
      <div class="fd"><label>Qty Requested</label><input type="number" value="${d.qty_requested}" onchange="uM('qty_requested',parseInt(this.value)||0)"></div>`;
  }else if(t==='shipment'){
    const opts=rs.filter(r=>eid?true:r.sR>0),sel=d.request_id?rs.find(r=>r.id==d.request_id):null;
    const mx=sel?(eid?sel.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):sel.sR):0;
    flds=`<div class="fd"><label>Request</label><div class="srw">
        <input value="${$(is||'')}" placeholder="Cari item..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${opts.filter(r=>{const q=(is||'').toLowerCase();return!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||fm(r.month).toLowerCase().includes(q)}).slice(0,12).map(r=>`<div class="sri" onclick="S.modal.d.request_id=${r.id};S.modal.is='${fm(r.month)} | ${$(r.item_code)}';S.modal.sl=false;rM()"><span class="c">${fm(r.month)}</span><span class="d">${$(r.item_code)} ${eid?'':'(sisa:'+r.sR+')'}</span></div>`).join('')}</div>`:''}</div>
        ${sel?`<div class="fd-h">✓ ${fm(sel.month)} | ${$(sel.item_code)} — maks: ${mx} pcs</div>`:''}</div>
      <div class="fd"><label>Tanggal Kirim</label><input type="date" value="${d.ship_date}" onchange="uM('ship_date',this.value)"></div>
      <div class="fd"><label>No. Surat Jalan</label><input value="${$(d.surat_jalan||'')}" oninput="uM('surat_jalan',this.value)"></div>
      <div class="fd"><label>Qty</label><input type="number" value="${d.qty}" onchange="uM('qty',parseInt(this.value)||0)"></div>`;
  }else if(t==='billing'){
    const opts=rs.filter(r=>eid?true:r.bT>0),sel=d.request_id?rs.find(r=>r.id==d.request_id):null;
    const mx=sel?(eid?sel.bT+(S.billings.find(b=>b.id===eid)?.qty||0):sel.bT):0;
    flds=`<div class="fd"><label>Request</label><div class="srw">
        <input value="${$(is||'')}" placeholder="Cari item..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${opts.filter(r=>{const q=(is||'').toLowerCase();return!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||fm(r.month).toLowerCase().includes(q)}).slice(0,12).map(r=>`<div class="sri" onclick="S.modal.d.request_id=${r.id};S.modal.is='${fm(r.month)} | ${$(r.item_code)}';S.modal.sl=false;rM()"><span class="c">${fm(r.month)}</span><span class="d">${$(r.item_code)} ${eid?'':'(blm:'+r.bT+')'}</span></div>`).join('')}</div>`:''}</div>
        ${sel?`<div class="fd-h">✓ ${fm(sel.month)} | ${$(sel.item_code)} — maks: ${mx} pcs</div>`:''}</div>
      <div class="fd"><label>No. PO</label><input value="${$(d.po_number||'')}" oninput="uM('po_number',this.value)"></div>
      <div class="fd"><label>Tanggal PO</label><input type="date" value="${d.billing_date||''}" onchange="uM('billing_date',this.value)"></div>
      <div class="fd"><label>Qty</label><input type="number" value="${d.qty}" onchange="uM('qty',parseInt(this.value)||0)"></div>`;
  }
  const nm={request:'Request',shipment:'Pengiriman',billing:'Penagihan',item:'Item'};
  root.innerHTML=`<div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()">
    <h3>${eid?'Edit':'Tambah'} ${nm[t]}</h3>${flds}
    <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveM()">Simpan</button></div>
  </div></div>`;
  setTimeout(()=>document.querySelectorAll('.srw input').forEach(i=>i.addEventListener('blur',()=>setTimeout(()=>{if(S.modal){S.modal.sl=false;rM()}},200))),50);
}

load();
</script>
</body>
</html>
