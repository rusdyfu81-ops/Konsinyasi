<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

<body>
<div class="hdr"><div><div class="hdr-t">Konsinyasi Tracker</div><div class="hdr-s">PT Philo Teknik → PT Yanmar Diesel Indonesia</div></div>
<div class="tabs"><button class="tab on" data-t="dashboard" onclick="go('dashboard')">◉ Dashboard</button><button class="tab" data-t="requests" onclick="go('requests')">📋 Request</button><button class="tab" data-t="items" onclick="go('items')">📦 Ringkasan</button></div></div>
<div class="wrap" id="app"><div class="loading"><div class="spinner"></div><br>Memuat data...</div></div>
<div id="mr"></div>
<script>
const SU='https://epmwxihwftcjgqqpzkme.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbXd4aWh3ZnRjamdxcXB6a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzg5MzAsImV4cCI6MjA5MDUxNDkzMH0.R8nyhlNq4adtWkeAuvXQJoXYA1WKrauUihkjvmZ8LDw';
const db=supabase.createClient(SU,SK);
let S={tab:'dashboard',items:[],requests:[],shipments:[],billings:[],search:'',fM:'all',exp:{},loading:true,modal:null,dc:null};

async function load(){S.loading=true;render();try{const[a,b,c,d]=await Promise.all([db.from('items').select('*').order('code'),db.from('requests').select('*').order('month').order('id'),db.from('shipments').select('*').order('ship_date'),db.from('billings').select('*').order('id')]);S.items=a.data||[];S.requests=b.data||[];S.shipments=c.data||[];S.billings=d.data||[]}catch(x){toast(x.message,'err')}S.loading=false;render()}

function rqS(){return S.requests.map(r=>{const sh=S.shipments.filter(s=>s.request_id===r.id).reduce((a,s)=>a+s.qty,0),bl=S.billings.filter(b=>b.request_id===r.id).reduce((a,b)=>a+b.qty,0),it=S.items.find(i=>i.code===r.item_code);return{...r,desc:it?.description||r.item_code,tS:sh,sR:r.qty_requested-sh,tB:bl,bT:sh-bl}})}
function itS(){const rs=rqS();return S.items.map(i=>{const rr=rs.filter(r=>r.item_code===i.code);return{...i,tReq:rr.reduce((a,r)=>a+r.qty_requested,0),tShip:rr.reduce((a,r)=>a+r.tS,0),tBill:rr.reduce((a,r)=>a+r.tB,0),bT:rr.reduce((a,r)=>a+r.tS,0)-rr.reduce((a,r)=>a+r.tB,0),mos:[...new Set(rr.map(r=>r.month))]}}).filter(i=>i.tReq>0)}
function aM(){return[...new Set(S.requests.map(r=>r.month))].sort()}
function fm(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][parseInt(mo)]+' '+y}
function $(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function go(t){S.tab=t;S.search='';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render()}
function toast(m,t='ok'){const el=document.createElement('div');el.className=`toast toast-${t}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function tog(id){S.exp[id]=!S.exp[id];render()}
function askD(t,id){S.dc={t,id};render()}
function canD(){S.dc=null;render()}
async function doD(t,id){if(t==='requests'){await db.from('shipments').delete().eq('request_id',id);await db.from('billings').delete().eq('request_id',id)}await db.from(t).delete().eq('id',id);S.dc=null;toast('Dihapus');await load()}

// ── Modal System ──
function openM(t,d,eid){S.modal={t,d,eid:eid||null,is:'',sl:false};rM()}
function closeM(){S.modal=null;document.getElementById('mr').innerHTML=''}
function uM(k,v){S.modal.d[k]=v;rM()}

// ── Single save (for edit/single add) ──
async function saveM(){
  const{t,d,eid}=S.modal;let err;
  if(t==='item'){
    if(!d.code||!d.description){toast('Isi semua field','err');return}
    if(eid)({error:err}=await db.from('items').update({code:d.code.toUpperCase(),description:d.description.toUpperCase()}).eq('id',eid));
    else({error:err}=await db.from('items').insert({code:d.code.toUpperCase(),description:d.description.toUpperCase()}));
  }else if(t==='request'){
    if(!d.month||!d.item_code||d.qty_requested<=0){toast('Isi semua field','err');return}
    const o={request_number:d.request_number||null,month:d.month,item_code:d.item_code,end_stock:d.end_stock||0,qty_requested:d.qty_requested};
    if(eid)({error:err}=await db.from('requests').update(o).eq('id',eid));else({error:err}=await db.from('requests').insert(o));
  }else if(t==='shipment'){
    if(!d.request_id||!d.ship_date||!d.surat_jalan||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):req?.sR||0;
    if(d.qty>mx){toast(`Melebihi sisa (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:d.qty};
    if(eid)({error:err}=await db.from('shipments').update(o).eq('id',eid));else({error:err}=await db.from('shipments').insert(o));
  }else if(t==='billing'){
    if(!d.request_id||!d.po_number||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.bT+(S.billings.find(b=>b.id===eid)?.qty||0):req?.bT||0;
    if(d.qty>mx){toast(`Melebihi belum tertagih (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),po_number:d.po_number,qty:d.qty,billing_date:d.billing_date||null};
    if(eid)({error:err}=await db.from('billings').update(o).eq('id',eid));else({error:err}=await db.from('billings').insert(o));
  }
  if(err){toast(err.message,'err');return}
  toast(eid?'Diupdate':'Ditambahkan');closeM();await load();
}

// ── Batch Shipment Save ──
async function saveBatchShip(){
  const d=S.modal.d;
  if(!d.ship_date||!d.surat_jalan){toast('Isi tanggal dan no. surat jalan','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}
  // Validate
  const rs=rqS();
  for(const row of rows){
    const req=rs.find(r=>r.id===row.request_id);
    if(req&&row.qty>req.sR){toast(`${req.item_code}: melebihi sisa (${req.sR})`,'err');return}
  }
  const inserts=rows.map(r=>({request_id:r.request_id,ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:r.qty}));
  const{error}=await db.from('shipments').insert(inserts);
  if(error){toast(error.message,'err');return}
  toast(`${rows.length} pengiriman dicatat`);closeM();await load();
}

// ── Batch Billing Save ──
async function saveBatchBill(){
  const d=S.modal.d;
  if(!d.po_number){toast('Isi no. PO/Invoice','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}
  const rs=rqS();
  for(const row of rows){
    const req=rs.find(r=>r.id===row.request_id);
    if(req&&row.qty>req.bT){toast(`${req.item_code}: melebihi belum tertagih (${req.bT})`,'err');return}
  }
  const inserts=rows.map(r=>({request_id:r.request_id,po_number:d.po_number,qty:r.qty,billing_date:d.billing_date||null}));
  const{error}=await db.from('billings').insert(inserts);
  if(error){toast(error.message,'err');return}
  toast(`${rows.length} penagihan dicatat`);closeM();await load();
}

// ── Import Request from Excel ──
function openImport(){
  S.modal={t:'import',d:{rows:[],request_number:'',month:''},is:'',sl:false};rM();
}

function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1});
      // Find header row (look for ITEM CODE or similar)
      let hdrIdx=-1;
      for(let i=0;i<Math.min(json.length,10);i++){
        const row=json[i].map(c=>String(c||'').toUpperCase());
        if(row.some(c=>c.includes('ITEM CODE')||c.includes('ITEM_CODE'))){hdrIdx=i;break}
      }
      if(hdrIdx===-1){toast('Header "ITEM CODE" tidak ditemukan','err');return}
      const hdr=json[hdrIdx].map(c=>String(c||'').toUpperCase().trim());
      const iCode=hdr.findIndex(h=>h.includes('ITEM CODE')||h.includes('ITEM_CODE'));
      const iDesc=hdr.findIndex(h=>h.includes('DESC'));
      const iEnd=hdr.findIndex(h=>h.includes('END STOCK')||h.includes('STOCK'));
      const iQty=hdr.findIndex(h=>h.includes('QTY')||h.includes('REQUESTED'));
      if(iCode===-1||iQty===-1){toast('Kolom ITEM CODE atau QTY tidak ditemukan','err');return}

      const rows=[];
      for(let i=hdrIdx+1;i<json.length;i++){
        const r=json[i];if(!r||!r[iCode])continue;
        const code=String(r[iCode]).trim().toUpperCase();
        if(!code||code==='NO.'||code==='NO')continue;
        rows.push({
          item_code:code,
          description:iDesc>=0?String(r[iDesc]||'').trim():'',
          end_stock:iEnd>=0?parseInt(r[iEnd])||0:0,
          qty_requested:parseInt(r[iQty])||0,
          checked:true,
          isNew:!S.items.find(it=>it.code===code)
        });
      }
      if(rows.length===0){toast('Tidak ada data valid','err');return}
      S.modal.d.rows=rows;
      toast(`${rows.length} item ditemukan`);
      rM();
    }catch(ex){toast('Gagal baca file: '+ex.message,'err')}
  };
  reader.readAsArrayBuffer(file);
}

async function saveImport(){
  const d=S.modal.d;
  if(!d.month){toast('Pilih bulan','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty_requested>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}

  // Insert new items first
  const newItems=rows.filter(r=>r.isNew);
  if(newItems.length>0){
    const unique=[...new Map(newItems.map(i=>[i.item_code,i])).values()];
    const{error}=await db.from('items').insert(unique.map(i=>({code:i.item_code,description:i.description||i.item_code})));
    if(error&&!error.message.includes('duplicate')){toast('Error item: '+error.message,'err');return}
    // Reload items
    const{data}=await db.from('items').select('*').order('code');
    S.items=data||[];
  }

  // Insert requests
  const inserts=rows.map(r=>({request_number:d.request_number||null,month:d.month,item_code:r.item_code,end_stock:r.end_stock,qty_requested:r.qty_requested}));
  const{error}=await db.from('requests').insert(inserts);
  if(error){toast(error.message,'err');return}
  toast(`${rows.length} request diimport`);closeM();await load();
}

// ── Open Batch Modals ──
function openBatchShip(){
  const rs=rqS().filter(r=>r.sR>0);
  const rows=rs.map(r=>({request_id:r.id,item_code:r.item_code,desc:r.desc,month:r.month,sisa:r.sR,qty:0,checked:false}));
  S.modal={t:'batchShip',d:{ship_date:'',surat_jalan:'',rows},is:'',sl:false};rM();
}
function openBatchBill(){
  const rs=rqS().filter(r=>r.bT>0);
  const rows=rs.map(r=>({request_id:r.id,item_code:r.item_code,desc:r.desc,month:r.month,belum:r.bT,qty:0,checked:false}));
  S.modal={t:'batchBill',d:{po_number:'',billing_date:'',rows},is:'',sl:false};rM();
}

// ── Render ──
function render(){
  const a=document.getElementById('app');
  if(S.loading){a.innerHTML='<div class="loading"><div class="spinner"></div><br>Memuat data...</div>';return}
  if(S.tab==='dashboard')rDash(a);else if(S.tab==='requests')rReq(a);else if(S.tab==='items')rIt(a);
}

function rDash(a){
  const rs=rqS(),tR=rs.reduce((a,r)=>a+r.qty_requested,0),tS=rs.reduce((a,r)=>a+r.tS,0),tB=rs.reduce((a,r)=>a+r.tB,0),bT=tS-tB;
  const pS=rs.filter(r=>r.sR>0).length,pB=rs.filter(r=>r.bT>0).length;
  const iS=itS().filter(i=>i.bT>0).sort((a,b)=>b.bT-a.bT).slice(0,8);
  const pR=rs.filter(r=>r.sR>0).sort((a,b)=>b.sR-a.sR);
  a.innerHTML=`<div class="stats">
    <div class="sc"><div class="sc-l">Total Diminta</div><div class="sc-v" style="color:var(--ac)">${tR.toLocaleString()}</div><div class="sc-s">pcs</div></div>
    <div class="sc"><div class="sc-l">Total Dikirim</div><div class="sc-v" style="color:var(--g)">${tS.toLocaleString()}</div><div class="sc-s">${pS} belum lengkap</div></div>
    <div class="sc"><div class="sc-l">Tertagih</div><div class="sc-v" style="color:var(--am)">${tB.toLocaleString()}</div></div>
    <div class="sc"><div class="sc-l">Belum Tertagih</div><div class="sc-v" style="color:${bT>0?'var(--r)':'var(--g)'}">${bT.toLocaleString()}</div><div class="sc-s">${pB} request</div></div>
  </div>
  <div class="pnl"><div class="pnl-t">Item Belum Tertagih Terbesar</div>
    ${iS.length===0?'<div class="empty">Semua sudah tertagih ✓</div>':iS.map(i=>{const p=i.tShip>0?Math.round(i.tBill/i.tShip*100):0;
      return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)">
        <div style="flex:1;min-width:0"><div class="b" style="font-size:13px">${$(i.code)}</div><div style="font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${$(i.description)}</div></div>
        <div class="pw"><div class="pb"><div class="pf" style="width:${p}%;background:${p===100?'var(--g)':'var(--am)'}"></div></div><div class="pl">${p}%</div></div>
        <div style="text-align:right;min-width:55px"><div style="font-size:15px;font-weight:700;color:var(--r)">${i.bT}</div></div></div>`}).join('')}
  </div>
  <div class="pnl"><div class="pnl-t">Request Belum Lengkap</div>
    ${pR.length===0?'<div class="empty">Semua terpenuhi ✓</div>':pR.slice(0,15).map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);flex-wrap:wrap">
      <span class="bg bg-a">${fm(r.month)}</span>
      <div style="flex:1;min-width:100px"><span class="b">${$(r.item_code)}</span> <span style="font-size:11px;color:var(--t2)">${$(r.desc)}</span></div>
      <span style="color:var(--am);font-weight:600">Sisa ${r.sR}<span style="font-size:11px;color:var(--t3)"> / ${r.qty_requested}</span></span></div>`).join('')}
  </div>`;
}

function rReq(a){
  const rs=rqS(),mos=aM(),q=S.search.toLowerCase();
  const f=rs.filter(r=>(S.fM==='all'||r.month===S.fM)&&(!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)||(r.request_number||'').toLowerCase().includes(q)));
  const g={};f.forEach(r=>{if(!g[r.month])g[r.month]=[];g[r.month].push(r)});
  a.innerHTML=`<div class="tb">
    <input placeholder="Cari kode / deskripsi / no. form..." value="${$(S.search)}" oninput="S.search=this.value;render()">
    <select onchange="S.fM=this.value;render()"><option value="all">Semua Bulan</option>${mos.map(m=>`<option value="${m}"${S.fM===m?' selected':''}>${fm(m)}</option>`).join('')}</select>
    <button class="btn btn-p" onclick="openImport()">📥 Import Request</button>
    <button class="btn btn-s" onclick="openBatchShip()">📦 Batch Kirim</button>
    <button class="btn btn-g" style="background:var(--amd);color:var(--am);border:none" onclick="openBatchBill()">💰 Batch Tagih</button>
  </div>
  ${Object.entries(g).sort(([a],[b])=>a.localeCompare(b)).map(([mo,rqs])=>{
    const rn=rqs.find(r=>r.request_number)?.request_number;
    return`<div style="margin-bottom:20px"><div class="mh">${fm(mo)}${rn?' — '+$(rn):''}</div><div class="tw"><table>
    <thead><tr><th style="width:28px"></th><th>Item</th><th>Deskripsi</th><th class="r">Stok</th><th class="r">Minta</th><th class="r">Kirim</th><th class="r">Sisa</th><th class="r">Tagih</th><th class="r">Blm</th><th>Aksi</th></tr></thead>
    <tbody>${rqs.map(r=>{
      const x=S.exp[r.id],sh=S.shipments.filter(s=>s.request_id===r.id),bl=S.billings.filter(b=>b.request_id===r.id);
      const isD=S.dc&&S.dc.t==='requests'&&S.dc.id===r.id;
      return`<tr class="trh">
        <td><button class="eb" onclick="tog(${r.id})">${x?'▼':'▶'}</button></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--t2)">${$(r.desc)}</td>
        <td class="r" style="color:var(--t3)">${r.end_stock}</td><td class="r b">${r.qty_requested}</td>
        <td class="r" style="color:var(--g);font-weight:600">${r.tS}</td>
        <td class="r"><span class="bg ${r.sR>0?'bg-a':'bg-g'}">${r.sR}</span></td>
        <td class="r" style="color:var(--am)">${r.tB}</td>
        <td class="r"><span class="bg ${r.bT>0?'bg-r':'bg-g'}">${r.bT}</span></td>
        <td class="nw">${isD?`<div class="dc"><span style="font-size:11px;color:var(--r)">Yakin?</span><button class="btn btn-d" onclick="doD('requests',${r.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<div style="display:flex;gap:3px">
          <button class="btn btn-g" onclick="openM('request',{request_number:'${$(r.request_number||'')}',month:'${r.month}',item_code:'${$(r.item_code)}',end_stock:${r.end_stock},qty_requested:${r.qty_requested}},${r.id})">✎</button>
          <button class="btn btn-d" onclick="askD('requests',${r.id})">✕</button></div>`}</td>
      </tr>${x?`<tr class="exp"><td colspan="10">
        <div class="ds"><div class="dt">📦 Pengiriman (${sh.length})</div>
          ${sh.length===0?'<div class="de">Belum ada</div>':`<table class="dtb"><thead><tr><th>Tanggal</th><th>Surat Jalan</th><th class="r">Qty</th><th>Aksi</th></tr></thead><tbody>
            ${sh.map(s=>{const isDs=S.dc&&S.dc.t==='shipments'&&S.dc.id===s.id;
              return`<tr><td>${s.ship_date}</td><td>${$(s.surat_jalan)}</td><td class="r b">${s.qty}</td>
              <td class="nw">${isDs?`<div class="dc"><button class="btn btn-d" onclick="doD('shipments',${s.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<button class="btn btn-g" onclick="openM('shipment',{request_id:${r.id},ship_date:'${s.ship_date}',surat_jalan:'${$(s.surat_jalan)}',qty:${s.qty}},${s.id})">✎</button> <button class="btn btn-d" onclick="askD('shipments',${s.id})">✕</button>`}</td></tr>`}).join('')}</tbody></table>`}
        </div>
        <div class="ds"><div class="dt">💰 Penagihan (${bl.length})</div>
          ${bl.length===0?'<div class="de">Belum ada</div>':`<table class="dtb"><thead><tr><th>No. PO</th><th>Tanggal</th><th class="r">Qty</th><th>Aksi</th></tr></thead><tbody>
            ${bl.map(b=>{const isDb=S.dc&&S.dc.t==='billings'&&S.dc.id===b.id;
              return`<tr><td class="b">${$(b.po_number)}</td><td>${b.billing_date||'-'}</td><td class="r b">${b.qty}</td>
              <td class="nw">${isDb?`<div class="dc"><button class="btn btn-d" onclick="doD('billings',${b.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<button class="btn btn-g" onclick="openM('billing',{request_id:${r.id},po_number:'${$(b.po_number)}',qty:${b.qty},billing_date:'${b.billing_date||''}'},${b.id})">✎</button> <button class="btn btn-d" onclick="askD('billings',${b.id})">✕</button>`}</td></tr>`}).join('')}</tbody></table>`}
        </div></td></tr>`:''}`}).join('')}</tbody></table></div></div>`}).join('')}
  ${Object.keys(g).length===0?'<div class="empty">Tidak ada data</div>':''}`;
}

function rIt(a){
  const items=itS(),q=S.search.toLowerCase();
  const f=items.filter(i=>!q||i.code.toLowerCase().includes(q)||i.description.toLowerCase().includes(q)).sort((a,b)=>b.bT-a.bT);
  a.innerHTML=`<div class="tb"><input placeholder="Cari item..." value="${$(S.search)}" oninput="S.search=this.value;render()">
    <button class="btn btn-p" onclick="openM('item',{code:'',description:''})">+ Item Baru</button></div>
  <div class="tw"><table><thead><tr><th>Item</th><th>Deskripsi</th><th class="r">Diminta</th><th class="r">Kirim</th><th class="r">Tagih</th><th class="r">Blm</th><th>Bulan</th></tr></thead>
  <tbody>${f.map(i=>`<tr class="trh"><td class="b nw">${$(i.code)}</td><td class="ell" style="color:var(--t2)">${$(i.description)}</td>
    <td class="r b">${i.tReq}</td><td class="r" style="color:var(--g);font-weight:600">${i.tShip}</td><td class="r" style="color:var(--am)">${i.tBill}</td>
    <td class="r"><span class="bg ${i.bT>0?'bg-r':'bg-g'}">${i.bT}</span></td>
    <td>${i.mos.map(m=>`<span class="bg bg-b" style="margin:1px">${fm(m)}</span>`).join(' ')}</td></tr>`).join('')}</tbody></table></div>
  ${f.length===0?'<div class="empty">Tidak ada item</div>':''}`;
}

// ── Modal Render ──
function rM(){
  const root=document.getElementById('mr');
  if(!S.modal){root.innerHTML='';return}
  const{t,d,eid,is}=S.modal;const rs=rqS();let html='';

  if(t==='item'){
    html=`<h3>${eid?'Edit':'Tambah'} Item</h3>
      <div class="fd"><label>Kode Item</label><input value="${$(d.code)}" oninput="uM('code',this.value)"></div>
      <div class="fd"><label>Deskripsi</label><input value="${$(d.description)}" oninput="uM('description',this.value)"></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveM()">Simpan</button></div>`;
  }else if(t==='request'){
    html=`<h3>${eid?'Edit':'Tambah'} Request</h3>
      <div class="fd"><label>No. Form</label><input value="${$(d.request_number)}" placeholder="PTP/1/III/26" oninput="uM('request_number',this.value)"></div>
      <div class="fd"><label>Bulan</label><input type="month" value="${d.month}" onchange="uM('month',this.value)"></div>
      <div class="fd"><label>Item</label><div class="srw"><input value="${$(is||d.item_code)}" placeholder="Ketik kode..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${S.items.filter(i=>{const q=(is||'').toLowerCase();return!q||i.code.toLowerCase().includes(q)||i.description.toLowerCase().includes(q)}).slice(0,8).map(i=>`<div class="sri" onclick="S.modal.d.item_code='${$(i.code)}';S.modal.is='${$(i.code)}';S.modal.sl=false;rM()"><span class="c">${$(i.code)}</span><span class="d">${$(i.description)}</span></div>`).join('')||'<div class="sri" style="color:var(--t3)">Tidak ditemukan</div>'}</div>`:''}</div>
        ${d.item_code?`<div class="fd-h">✓ ${$(d.item_code)}</div>`:''}</div>
      <div class="fd"><label>End Stock</label><input type="number" value="${d.end_stock}" onchange="uM('end_stock',parseInt(this.value)||0)"></div>
      <div class="fd"><label>Qty Requested</label><input type="number" value="${d.qty_requested}" onchange="uM('qty_requested',parseInt(this.value)||0)"></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveM()">Simpan</button></div>`;
  }else if(t==='shipment'||t==='billing'){
    const isShip=t==='shipment';
    const opts=isShip?rs.filter(r=>eid?true:r.sR>0):rs.filter(r=>eid?true:r.bT>0);
    const sel=d.request_id?rs.find(r=>r.id==d.request_id):null;
    const mx=sel?(isShip?(eid?sel.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):sel.sR):(eid?sel.bT+(S.billings.find(b=>b.id===eid)?.qty||0):sel.bT)):0;
    html=`<h3>${eid?'Edit':'Tambah'} ${isShip?'Pengiriman':'Penagihan'}</h3>
      <div class="fd"><label>Request</label><div class="srw"><input value="${$(is||'')}" placeholder="Cari item..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${opts.filter(r=>{const q=(is||'').toLowerCase();return!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)}).slice(0,10).map(r=>`<div class="sri" onclick="S.modal.d.request_id=${r.id};S.modal.is='${fm(r.month)} | ${$(r.item_code)}';S.modal.sl=false;rM()"><span class="c">${fm(r.month)}</span><span class="d">${$(r.item_code)} (${isShip?'sisa:'+r.sR:'blm:'+r.bT})</span></div>`).join('')}</div>`:''}</div>
        ${sel?`<div class="fd-h">✓ ${fm(sel.month)} | ${$(sel.item_code)} — maks: ${mx}</div>`:''}</div>
      ${isShip?`<div class="fd"><label>Tanggal Kirim</label><input type="date" value="${d.ship_date}" onchange="uM('ship_date',this.value)"></div>
        <div class="fd"><label>No. Surat Jalan</label><input value="${$(d.surat_jalan||'')}" oninput="uM('surat_jalan',this.value)"></div>`
        :`<div class="fd"><label>No. PO / Invoice</label><input value="${$(d.po_number||'')}" oninput="uM('po_number',this.value)"></div>
        <div class="fd"><label>Tanggal</label><input type="date" value="${d.billing_date||''}" onchange="uM('billing_date',this.value)"></div>`}
      <div class="fd"><label>Qty</label><input type="number" value="${d.qty}" onchange="uM('qty',parseInt(this.value)||0)"></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveM()">Simpan</button></div>`;
  }else if(t==='batchShip'){
    const checked=d.rows.filter(r=>r.checked).length;
    html=`<h3>📦 Batch Pengiriman</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="fd" style="flex:1;min-width:140px"><label>Tanggal Kirim</label><input type="date" value="${d.ship_date}" onchange="S.modal.d.ship_date=this.value"></div>
        <div class="fd" style="flex:1;min-width:140px"><label>No. Surat Jalan</label><input value="${$(d.surat_jalan)}" oninput="S.modal.d.surat_jalan=this.value" placeholder="SJ-1206"></div>
      </div>
      <div class="batch-info">${checked} item dipilih dari ${d.rows.length} yang tersedia</div>
      <div style="max-height:350px;overflow-y:auto">
      <table class="batch-tbl"><thead><tr><th><input type="checkbox" ${d.rows.every(r=>r.checked)?'checked':''} onchange="S.modal.d.rows.forEach(r=>r.checked=this.checked);rM()"></th><th>Bulan</th><th>Item</th><th>Deskripsi</th><th class="r">Sisa</th><th class="r">Qty Kirim</th></tr></thead>
      <tbody>${d.rows.map((r,i)=>`<tr style="${r.checked?'':'opacity:.4'}">
        <td><input type="checkbox" ${r.checked?'checked':''} onchange="S.modal.d.rows[${i}].checked=this.checked;rM()"></td>
        <td><span class="bg bg-b">${fm(r.month)}</span></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--t2);max-width:150px">${$(r.desc)}</td>
        <td class="r">${r.sisa}</td>
        <td class="r"><input type="number" value="${r.qty}" min="0" max="${r.sisa}" onchange="S.modal.d.rows[${i}].qty=parseInt(this.value)||0" ${r.checked?'':'disabled'}></td>
      </tr>`).join('')}</tbody></table></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveBatchShip()">Simpan ${checked} Pengiriman</button></div>`;
  }else if(t==='batchBill'){
    const checked=d.rows.filter(r=>r.checked).length;
    html=`<h3>💰 Batch Penagihan</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="fd" style="flex:1;min-width:140px"><label>No. PO / Invoice</label><input value="${$(d.po_number)}" oninput="S.modal.d.po_number=this.value" placeholder="INV-1185"></div>
        <div class="fd" style="flex:1;min-width:140px"><label>Tanggal</label><input type="date" value="${d.billing_date||''}" onchange="S.modal.d.billing_date=this.value"></div>
      </div>
      <div class="batch-info">${checked} item dipilih</div>
      <div style="max-height:350px;overflow-y:auto">
      <table class="batch-tbl"><thead><tr><th><input type="checkbox" ${d.rows.every(r=>r.checked)?'checked':''} onchange="S.modal.d.rows.forEach(r=>r.checked=this.checked);rM()"></th><th>Bulan</th><th>Item</th><th>Deskripsi</th><th class="r">Belum</th><th class="r">Qty Tagih</th></tr></thead>
      <tbody>${d.rows.map((r,i)=>`<tr style="${r.checked?'':'opacity:.4'}">
        <td><input type="checkbox" ${r.checked?'checked':''} onchange="S.modal.d.rows[${i}].checked=this.checked;rM()"></td>
        <td><span class="bg bg-b">${fm(r.month)}</span></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--t2);max-width:150px">${$(r.desc)}</td>
        <td class="r">${r.belum}</td>
        <td class="r"><input type="number" value="${r.qty}" min="0" max="${r.belum}" onchange="S.modal.d.rows[${i}].qty=parseInt(this.value)||0" ${r.checked?'':'disabled'}></td>
      </tr>`).join('')}</tbody></table></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button><button class="btn btn-p" onclick="saveBatchBill()">Simpan ${checked} Penagihan</button></div>`;
  }else if(t==='import'){
    html=`<h3>📥 Import Request dari Excel</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div class="fd" style="flex:1;min-width:140px"><label>No. Form Request</label><input value="${$(d.request_number)}" oninput="S.modal.d.request_number=this.value" placeholder="PTP/1/IV/26"></div>
        <div class="fd" style="flex:1;min-width:140px"><label>Bulan</label><input type="month" value="${d.month}" onchange="S.modal.d.month=this.value"></div>
      </div>
      ${d.rows.length===0?`
        <div class="drop-zone" id="dropzone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.classList.add('over')" ondragleft="this.classList.remove('over')" ondrop="event.preventDefault();this.classList.remove('over');handleFile(event.dataTransfer.files[0])">
          <div style="font-size:32px;margin-bottom:8px">📄</div>
          <div style="font-size:14px;font-weight:600">Drop file Excel di sini</div>
          <div style="font-size:12px;margin-top:4px">atau klik untuk pilih file (.xlsx, .xls, .csv)</div>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="handleFile(this.files[0])">
        </div>
        <div class="fd-h" style="margin-top:8px">Format: kolom ITEM CODE, DESCRIPTION (opsional), END STOCK CONSIGNMENT (opsional), QTY REQUESTED</div>
      `:`
        <div class="batch-info">${d.rows.filter(r=>r.checked).length} dari ${d.rows.length} item akan diimport ${d.rows.filter(r=>r.isNew).length>0?`· <span style="color:var(--am)">${d.rows.filter(r=>r.isNew).length} item baru</span>`:''}</div>
        <div style="max-height:300px;overflow-y:auto">
        <table class="batch-tbl"><thead><tr><th><input type="checkbox" ${d.rows.every(r=>r.checked)?'checked':''} onchange="S.modal.d.rows.forEach(r=>r.checked=this.checked);rM()"></th><th>Item Code</th><th>Deskripsi</th><th class="r">End Stock</th><th class="r">Qty Request</th><th>Status</th></tr></thead>
        <tbody>${d.rows.map((r,i)=>`<tr style="${r.checked?'':'opacity:.4'}">
          <td><input type="checkbox" ${r.checked?'checked':''} onchange="S.modal.d.rows[${i}].checked=this.checked;rM()"></td>
          <td class="b nw">${$(r.item_code)}</td><td class="ell" style="max-width:180px;color:var(--t2)">${$(r.description)}</td>
          <td class="r">${r.end_stock}</td><td class="r b">${r.qty_requested}</td>
          <td>${r.isNew?'<span class="bg bg-a">Item Baru</span>':'<span class="bg bg-g">OK</span>'}</td>
        </tr>`).join('')}</tbody></table></div>
        <div style="margin-top:8px"><button class="btn btn-g" onclick="S.modal.d.rows=[];rM()">↩ Pilih file lain</button></div>
      `}
      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button>${d.rows.length>0?`<button class="btn btn-p" onclick="saveImport()">Import ${d.rows.filter(r=>r.checked).length} Request</button>`:''}</div>`;
  }

  root.innerHTML=`<div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()">${html}</div></div>`;
  setTimeout(()=>document.querySelectorAll('.srw input').forEach(i=>i.addEventListener('blur',()=>setTimeout(()=>{if(S.modal){S.modal.sl=false;rM()}},200))),50);
}

load();
</script>
</body>
</html>
