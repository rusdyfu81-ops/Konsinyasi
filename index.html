<!DOCTYPE html>
<html lang="id">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0f1117;--card:#1a1d27;--c2:#21242f;--bdr:#2a2d3a;--ac:#3b82f6;--acd:#1e3a5f;--g:#22c55e;--gd:#14532d;--am:#f59e0b;--amd:#78350f;--r:#ef4444;--rd:#7f1d1d;--t:#e2e8f0;--t2:#94a3b8;--t3:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-t{font-size:17px;font-weight:700;letter-spacing:-.3px}.hdr-s{font-size:11px;color:var(--t2)}
.tabs{display:flex;gap:4px}
.tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:transparent;color:var(--t3);transition:.15s;font-family:inherit}
.tab.on{background:var(--ac);color:#fff}.tab:hover:not(.on){color:var(--t)}
.wrap{padding:20px;max-width:1200px;margin:0 auto}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.sc{background:var(--card);border-radius:10px;padding:16px 20px;border:1px solid var(--bdr);flex:1;min-width:140px}
.sc-l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sc-v{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}.sc-s{font-size:11px;color:var(--t3);margin-top:2px}
.btn-am{background:var(--amd);color:var(--am);border:none}
.pnl{background:var(--card);border-radius:10px;border:1px solid var(--bdr);padding:20px;margin-bottom:16px}.pnl-t{font-size:15px;font-weight:700;margin-bottom:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--bdr)}
td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:top}
.trh:hover td{background:var(--c2)}
.r{text-align:right}.b{font-weight:600}.nw{white-space:nowrap}
.ell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;display:inline-block}
.bg-b{background:var(--acd);color:var(--ac)}.bg-g{background:var(--gd);color:var(--g)}.bg-a{background:var(--amd);color:var(--am)}.bg-r{background:var(--rd);color:var(--r)}
.btn{border:none;border-radius:6px;cursor:pointer;font-weight:600;font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:5px 12px}
.btn:hover{opacity:.85}.btn-p{background:var(--ac);color:#fff}.btn-g{background:transparent;color:var(--t2);border:1px solid var(--bdr)}.btn-d{background:var(--rd);color:var(--r)}.btn-s{background:var(--gd);color:var(--g)}
.tb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{flex:1;min-width:140px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.mh{font-size:14px;font-weight:700;color:var(--ac);margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--acd)}
.pw{width:100px}.pb{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width .3s}.pl{font-size:10px;color:var(--t3);margin-top:2px}
.exp td{background:var(--c2);padding:12px 16px}
.ds{margin-bottom:12px}.ds:last-child{margin-bottom:0}
.dt{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.dtb{width:100%;font-size:11px;border-collapse:collapse}.dtb th{padding:4px 8px;font-size:10px;border-bottom:1px solid var(--bdr);color:var(--t3)}.dtb td{padding:4px 8px;border-bottom:1px solid var(--bdr)}
.de{font-size:11px;color:var(--t3);font-style:italic;padding:4px 0}
.eb{cursor:pointer;user-select:none;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:10px;background:var(--c2);color:var(--t2);border:1px solid var(--bdr);transition:.15s}.eb:hover{background:var(--acd);color:var(--ac)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:var(--card);border-radius:12px;padding:24px;width:700px;max-width:95vw;border:1px solid var(--bdr);max-height:92vh;overflow-y:auto}
.md h3{margin-bottom:16px;font-size:16px}
.fd{margin-bottom:12px}.fd label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px}
.fd input,.fd select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.fd-h{font-size:11px;color:var(--t3);margin-top:2px}
.srw{position:relative}.srl{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--bdr);border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:10}
.sri{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--bdr)}.sri:hover{background:var(--c2)}.sri .c{font-weight:600;color:var(--t)}.sri .d{color:var(--t3);font-size:11px;margin-left:6px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.dc{display:inline-flex;align-items:center;gap:4px;background:var(--rd);border:1px solid var(--r);border-radius:6px;padding:2px 4px}.dc .btn{font-size:11px;padding:3px 8px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;animation:sU .3s ease}
.toast-ok{background:var(--gd);color:var(--g);border:1px solid rgba(34,197,94,.25)}.toast-err{background:var(--rd);color:var(--r);border:1px solid rgba(239,68,68,.25)}
@keyframes sU{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading{text-align:center;padding:40px;color:var(--t3)}.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--bdr);border-top-color:var(--ac);border-radius:50%;animation:sp .8s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}.empty{text-align:center;padding:24px;color:var(--t3);font-size:13px}
/* Batch table */
.batch-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}.batch-tbl th{padding:6px 8px;text-align:left;font-size:11px;color:var(--t3);border-bottom:1px solid var(--bdr)}.batch-tbl td{padding:4px 8px;border-bottom:1px solid var(--bdr)}
.batch-tbl input[type=number]{width:70px;padding:4px 8px;background:var(--bg);border:1px solid var(--bdr);border-radius:4px;color:var(--t);font-size:12px;font-family:inherit;text-align:right}
.batch-tbl input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px;cursor:pointer}
.batch-info{font-size:11px;color:var(--t3);padding:4px 0}
/* Import preview */
.import-preview{background:var(--bg);border:1px solid var(--bdr);border-radius:8px;padding:12px;margin:12px 0;max-height:300px;overflow-y:auto}
.import-preview table{font-size:11px}.import-preview th{font-size:10px;padding:4px 6px}.import-preview td{padding:4px 6px}
.drop-zone{border:2px dashed var(--bdr);border-radius:10px;padding:30px;text-align:center;color:var(--t3);cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.over{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.drop-zone input{display:none}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:640px){.hdr{flex-direction:column;align-items:flex-start}.sc-v{font-size:20px}.sc{min-width:100px}.md{width:98vw}}
</style>
</head>
<body>
<div class="hdr"><div><div class="hdr-t">Konsinyasi Tracker</div><div class="hdr-s">Philo Teknik → Yanmar Diesel Indonesia</div></div>
<div class="tabs"><button class="tab on" data-t="dashboard" onclick="go('dashboard')">Dashboard</button><button class="tab" data-t="requests" onclick="go('requests')">Request</button><button class="tab" data-t="shipments" onclick="go('shipments')">Pengiriman</button><button class="tab" data-t="billings" onclick="go('billings')">Penagihan</button><button class="tab" data-t="aging" onclick="go('aging')">Aging Report</button><button class="tab" data-t="demand" onclick="go('demand')">Saran Stok</button><button class="tab" data-t="items" onclick="go('items')">Ringkasan</button><button class="tab" data-t="converter" onclick="go('converter')">🔄 Konverter</button></div></div>
<div class="wrap" id="app"><div class="loading"><div class="spinner"></div><br>Memuat data...</div></div>
<div id="mr"></div>
<script>
const SU='https://epmwxihwftcjgqqpzkme.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbXd4aWh3ZnRjamdxcXB6a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzg5MzAsImV4cCI6MjA5MDUxNDkzMH0.R8nyhlNq4adtWkeAuvXQJoXYA1WKrauUihkjvmZ8LDw';
const db=supabase.createClient(SU,SK);
let S={tab:'dashboard',items:[],requests:[],shipments:[],billings:[],search:'',fM:'all',exp:{},loading:true,modal:null,dc:null,saving:false,agingBucket:'all',page:1,perPage:50,demandLabel:'all'};

// ── Debounce ──
let _debTimer=null;
function debounceSearch(v){S.search=v;clearTimeout(_debTimer);_debTimer=setTimeout(()=>{S.page=1;render()},200)}

// ── Beforeunload warning ──
window.addEventListener('beforeunload',e=>{if(S.modal||S.saving){e.preventDefault();e.returnValue=''}});

// ── Data Loading (partial-tolerant) ──
async function load(){S.loading=true;render();
  const jobs=[
    db.from('items').select('*').order('code'),
    db.from('requests').select('*').order('month').order('id'),
    db.from('shipments').select('*').order('ship_date'),
    db.from('billings').select('*').order('id')
  ];
  const results=await Promise.allSettled(jobs);
  const names=['items','requests','shipments','billings'];
  const errors=[];
  results.forEach((r,i)=>{
    if(r.status==='fulfilled'&&!r.value.error){S[names[i]]=r.value.data||[]}
    else{const msg=r.status==='rejected'?r.reason?.message:(r.value.error?.message||'');errors.push(names[i]+': '+(msg||'gagal'))}
  });
  if(errors.length)toast('Sebagian data gagal dimuat: '+errors.join(', '),'err');
  _rqVer++;_agingCache=null;S.loading=false;render();
}

let _rqCache=null,_rqVer=0,_rqLastVer=-1;
function rqS(){if(_rqLastVer===_rqVer&&_rqCache)return _rqCache;_rqLastVer=_rqVer;_agingCache=null;_rqCache=S.requests.map(r=>{const sh=S.shipments.filter(s=>s.request_id===r.id).reduce((a,s)=>a+s.qty,0),bl=S.billings.filter(b=>b.request_id===r.id).reduce((a,b)=>a+b.qty,0),it=S.items.find(i=>i.code===r.item_code);return{...r,desc:it?.description||r.item_code,tS:sh,sR:r.qty_requested-sh,tB:bl,bT:sh-bl}});return _rqCache}
function itS(){const rs=rqS();return S.items.map(i=>{const rr=rs.filter(r=>r.item_code===i.code);const tShip=rr.reduce((a,r)=>a+r.tS,0),tBill=rr.reduce((a,r)=>a+r.tB,0),bT=tShip-tBill;const harga=parseFloat(i.harga_default)||0;return{...i,tReq:rr.reduce((a,r)=>a+r.qty_requested,0),tShip,tBill,bT,estNilai:bT*harga,mos:[...new Set(rr.map(r=>r.month))]}}).filter(i=>i.tReq>0)}

// ── Pagination helper ──
function paginate(arr){
  const total=arr.length,pages=Math.ceil(total/S.perPage)||1;
  if(S.page>pages)S.page=pages;
  if(S.page<1)S.page=1;
  const start=(S.page-1)*S.perPage;
  const sliced=arr.slice(start,start+S.perPage);
  return{data:sliced,total,pages,page:S.page};
}
function pgHtml(p){
  if(p.pages<=1)return'';
  const btns=[];
  btns.push(`<button class="btn btn-g" ${p.page<=1?'disabled':''} onclick="S.page=${p.page-1};render()" style="padding:4px 10px;font-size:11px">‹</button>`);
  // Show max 5 page buttons
  let start=Math.max(1,p.page-2),end=Math.min(p.pages,start+4);
  if(end-start<4)start=Math.max(1,end-4);
  for(let i=start;i<=end;i++){
    btns.push(`<button class="btn ${i===p.page?'btn-p':'btn-g'}" onclick="S.page=${i};render()" style="padding:4px 10px;font-size:11px;min-width:32px">${i}</button>`);
  }
  btns.push(`<button class="btn btn-g" ${p.page>=p.pages?'disabled':''} onclick="S.page=${p.page+1};render()" style="padding:4px 10px;font-size:11px">›</button>`);
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px"><div style="font-size:11px;color:var(--t3)">Menampilkan ${(p.page-1)*S.perPage+1}–${Math.min(p.page*S.perPage,p.total)} dari ${p.total}</div><div style="display:flex;gap:4px">${btns.join('')}</div></div>`;
}
function fmRp(v){if(v>=1e9)return'Rp '+(v/1e9).toFixed(1).replace('.',',')+'M';if(v>=1e6)return'Rp '+(v/1e6).toFixed(1).replace('.',',')+'jt';if(v>=1e3)return'Rp '+(v/1e3).toFixed(0)+'rb';return'Rp '+Math.round(v).toLocaleString('id-ID');}
function fmRpFull(v){return'Rp '+Math.round(v).toLocaleString('id-ID');}
function aM(){return[...new Set(S.requests.map(r=>r.month))].sort()}
function fm(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][parseInt(mo)]+' '+y}
function $(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function go(t){S.tab=t;S.search='';S.fM='all';S.agingBucket='all';S.demandLabel='all';S.page=1;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render()}
function toast(m,t='ok'){const el=document.createElement('div');el.className=`toast toast-${t}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function tog(id){S.exp[id]=!S.exp[id];render()}
function askD(t,id){
  let warn='';
  if(t==='requests'){
    const nSh=S.shipments.filter(s=>s.request_id===id).length;
    const nBl=S.billings.filter(b=>b.request_id===id).length;
    if(nSh||nBl)warn=`${nSh} kirim, ${nBl} tagih ikut hapus`;
  }
  S.dc={t,id,warn};render();
}
function canD(){S.dc=null;render()}

// ── Soft Delete with Undo ──
let _undoData=null,_undoTimer=null;
async function doD(t,id){
  // Capture data for undo
  const backups={table:t,id,related:[]};
  if(t==='requests'){
    backups.main=S.requests.find(r=>r.id===id);
    backups.related=[
      ...S.shipments.filter(s=>s.request_id===id).map(s=>({table:'shipments',data:s})),
      ...S.billings.filter(b=>b.request_id===id).map(b=>({table:'billings',data:b}))
    ];
    await db.from('shipments').delete().eq('request_id',id);
    await db.from('billings').delete().eq('request_id',id);
  }else if(t==='shipments'){
    backups.main=S.shipments.find(s=>s.id===id);
  }else if(t==='billings'){
    backups.main=S.billings.find(b=>b.id===id);
  }else if(t==='items'){
    backups.main=S.items.find(i=>i.id===id);
  }
  const{error}=await db.from(t).delete().eq('id',id);
  if(error){toast(errMsg(error),'err');return}
  S.dc=null;
  _undoData=backups;
  clearTimeout(_undoTimer);
  // Show undo toast
  const el=document.createElement('div');
  el.className='toast toast-ok';
  el.style.cursor='pointer';
  el.innerHTML='Dihapus — <u>Undo</u> <span style="opacity:.6;font-size:11px">(8 detik)</span>';
  el.onclick=async()=>{el.remove();clearTimeout(_undoTimer);await undoDelete()};
  document.body.appendChild(el);
  _undoTimer=setTimeout(()=>{el.remove();_undoData=null},8000);
  await load();
}

async function undoDelete(){
  if(!_undoData)return;
  const{table,main,related}=_undoData;
  _undoData=null;
  try{
    // Re-insert main record
    if(main){
      const{id,...rest}=main;
      await db.from(table).insert(rest);
    }
    // Re-insert related records (shipments/billings of a request)
    // Note: request_id will differ since the request got a new id
    // For simplicity we re-insert with original data; if FK fails, we skip
    if(related&&related.length>0){
      // Need the new request id
      if(table==='requests'&&main){
        const{data:newReqs}=await db.from('requests').select('id').eq('item_code',main.item_code).eq('month',main.month).order('id',{ascending:false}).limit(1);
        const newId=newReqs?.[0]?.id;
        if(newId){
          for(const rel of related){
            const{id,...rd}=rel.data;
            rd.request_id=newId;
            await db.from(rel.table).insert(rd);
          }
        }
      }
    }
    toast('Undo berhasil');
  }catch(e){toast('Undo gagal: '+e.message,'err')}
  await load();
}

// ── Modal System ──
function openM(t,d,eid){S.modal={t,d,eid:eid||null,is:'',sl:false};rM()}
function closeM(){S.modal=null;document.getElementById('mr').innerHTML=''}
function uM(k,v){S.modal.d[k]=v;rM()}

// ── Error message helper (Task 1.3) ──
function errMsg(e){
  if(!e||!e.message)return'Terjadi kesalahan';
  const m=e.message;
  if(m.includes('not-null')||m.includes('null value'))return'Data tidak lengkap, periksa kembali isian';
  if(m.includes('unique')||m.includes('duplicate'))return'Data sudah ada, tidak bisa duplikat';
  if(m.includes('foreign key')||m.includes('violates foreign'))return'Data referensi tidak ditemukan';
  if(m.includes('network')||m.includes('fetch'))return'Koneksi gagal, coba lagi';
  if(m.includes('JWT')||m.includes('auth'))return'Sesi habis, muat ulang halaman';
  return'Gagal menyimpan data';
}

// ── Loading state helper (Task 1.1) ──
function setBusy(busy){
  S.saving=busy;
  document.querySelectorAll('.btn-p[onclick*="save"],#save-btn').forEach(b=>{
    b.disabled=busy;
    b.style.opacity=busy?'0.6':'1';
    b.style.cursor=busy?'not-allowed':'pointer';
  });
}

// ── Single save (for edit/single add) ──
async function saveM(){
  if(S.saving)return;
  const{t,d,eid}=S.modal;let err;
  if(t==='item'){
    if(!d.code||!d.description){toast('Isi semua field','err');return}
    const itemData={code:d.code.toUpperCase(),description:d.description.toUpperCase(),harga_default:parseFloat(d.harga_default)||0};
    setBusy(true);
    if(eid)({error:err}=await db.from('items').update(itemData).eq('id',eid));
    else({error:err}=await db.from('items').insert(itemData));
  }else if(t==='request'){
    if(!d.month||!d.item_code||d.qty_requested<=0){toast('Isi semua field','err');return}
    const o={request_number:d.request_number||null,month:d.month,item_code:d.item_code,end_stock:d.end_stock||0,qty_requested:d.qty_requested};
    setBusy(true);
    if(eid)({error:err}=await db.from('requests').update(o).eq('id',eid));else({error:err}=await db.from('requests').insert(o));
  }else if(t==='shipment'){
    if(!d.request_id||!d.ship_date||!d.surat_jalan||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):req?.sR||0;
    if(d.qty>mx){toast(`Melebihi sisa (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:d.qty};
    setBusy(true);
    if(eid)({error:err}=await db.from('shipments').update(o).eq('id',eid));else({error:err}=await db.from('shipments').insert(o));
  }else if(t==='billing'){

function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1});
      // Find header row (look for ITEM CODE or similar)
      let hdrIdx=-1;
      for(let i=0;i<Math.min(json.length,10);i++){
        const row=json[i].map(c=>String(c||'').toUpperCase());
        if(row.some(c=>c.includes('ITEM CODE')||c.includes('ITEM_CODE'))){hdrIdx=i;break}
      }
      if(hdrIdx===-1){toast('Header "ITEM CODE" tidak ditemukan','err');return}
      const hdr=json[hdrIdx].map(c=>String(c||'').toUpperCase().trim());
      const iCode=hdr.findIndex(h=>h.includes('ITEM CODE')||h.includes('ITEM_CODE'));
      const iDesc=hdr.findIndex(h=>h.includes('DESC'));
      const iEnd=hdr.findIndex(h=>h.includes('END STOCK')||h.includes('STOCK'));
      const iQty=hdr.findIndex(h=>h.includes('QTY')||h.includes('REQUESTED'));
      if(iCode===-1||iQty===-1){toast('Kolom ITEM CODE atau QTY tidak ditemukan','err');return}

      const rows=[];
      for(let i=hdrIdx+1;i<json.length;i++){
        const r=json[i];if(!r||!r[iCode])continue;
        const code=String(r[iCode]).trim().toUpperCase();
        if(!code||code==='NO.'||code==='NO')continue;
        rows.push({
          item_code:code,
          description:iDesc>=0?String(r[iDesc]||'').trim():'',
          end_stock:iEnd>=0?parseInt(r[iEnd])||0:0,
          qty_requested:parseInt(r[iQty])||0,
          checked:true,
          isNew:!S.items.find(it=>it.code===code)
        });
      }
      if(rows.length===0){toast('Tidak ada data valid','err');return}
      S.modal.d.rows=rows;
      toast(`${rows.length} item ditemukan`);
      rM();
    }catch(ex){toast('Gagal baca file: '+ex.message,'err')}
  };
  reader.readAsArrayBuffer(file);
}

async function saveImport(){
  const d=S.modal.d;

// ── Aging Detail & Report (cached) ──
let _agingCache=null;
function agingDetail(){
  if(_agingCache)return _agingCache;
  const rs=rqS();
  const today=new Date();today.setHours(0,0,0,0);
  const rows=[];
  const reqIds=[...new Set(S.shipments.map(s=>s.request_id))];
  reqIds.forEach(rid=>{
    const req=rs.find(r=>r.id===rid);
    if(!req||req.bT<=0)return;
    const it=S.items.find(i=>i.code===req.item_code);
    const harga=parseFloat(it?.harga_default)||0;
    const ships=S.shipments.filter(s=>s.request_id===rid).sort((a,b)=>a.ship_date.localeCompare(b.ship_date));
    let sisaBilled=req.tB;
    ships.forEach(s=>{
      if(sisaBilled>=s.qty){sisaBilled-=s.qty;return}
      const unbilled=s.qty-sisaBilled;sisaBilled=0;
      const tglKirim=new Date(s.ship_date);
      const hari=Math.floor((today-tglKirim)/(1000*60*60*24));
      const bucket=hari<=30?'0-30':hari<=60?'30-60':'>60';
      rows.push({
        item_code:req.item_code,
        description:it?.description||req.item_code,
        month:req.month,
        request_number:req.request_number||'-',
        surat_jalan:s.surat_jalan,
        ship_date:s.ship_date,
        qty_shipped:s.qty,
        qty_unbilled:unbilled,
        hari,
        bucket,
        harga,
        nilai:unbilled*harga
      });
    });
  });
  _agingCache=rows.sort((a,b)=>b.hari-a.hari);
  return _agingCache;
}

  ];

  });

// ── Demand Intelligence / Saran Stok ──
function demandAnalysis(){
  const rs=rqS();
  const months=aM();
  const now=new Date();
  const curM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  // Build per-item stats across all months
  const itemStats={};
  rs.forEach(r=>{
    if(!itemStats[r.item_code])itemStats[r.item_code]={code:r.item_code,desc:r.desc,monthlyReq:{},monthlyShip:{},monthlyBill:{},totalReq:0,totalShip:0,totalBill:0,reqCount:0,shipCount:0,billCount:0,lastEnd:0,months:new Set()};
    const st=itemStats[r.item_code];
    st.months.add(r.month);
    st.monthlyReq[r.month]=(st.monthlyReq[r.month]||0)+r.qty_requested;
    st.monthlyShip[r.month]=(st.monthlyShip[r.month]||0)+r.tS;
    st.monthlyBill[r.month]=(st.monthlyBill[r.month]||0)+r.tB;
    st.totalReq+=r.qty_requested;st.totalShip+=r.tS;st.totalBill+=r.tB;
    st.reqCount++;
    if(r.tS>0)st.shipCount++;
    if(r.tB>0)st.billCount++;
    if(r.end_stock>0)st.lastEnd=Math.max(st.lastEnd,r.end_stock);
  });
  const totalMonths=months.length||1;
  return Object.values(itemStats).map(st=>{
    const it=S.items.find(i=>i.code===st.code);
    const harga=parseFloat(it?.harga_default)||0;
    const activeMonths=st.months.size;
    // Frequency: how many months this item appeared (0-1 scale)
    const frequency=activeMonths/totalMonths;
    // Volume: avg monthly request qty
    const avgReqPerMonth=st.totalReq/totalMonths;
    // Billing rate: how well it gets billed (indicates real sales)
    const billRate=st.totalShip>0?st.totalBill/st.totalShip:0;
    // Recency: was it requested recently? (last 3 months)
    const recent3=months.slice(-3);
    const recentHits=recent3.filter(m=>st.monthlyReq[m]>0).length;
    const recency=recentHits/Math.min(3,totalMonths);
    // Trend: compare last 2 months vs prev 2 months
    const last2=months.slice(-2),prev2=months.slice(-4,-2);
    const qtyLast2=last2.reduce((s,m)=>s+(st.monthlyReq[m]||0),0);
    const qtyPrev2=prev2.reduce((s,m)=>s+(st.monthlyReq[m]||0),0);
    const trend=qtyPrev2>0?((qtyLast2-qtyPrev2)/qtyPrev2):qtyLast2>0?1:0;
    // Composite score (weighted)
    const score=Math.round((frequency*25+Math.min(avgReqPerMonth/100,1)*25+billRate*20+recency*20+Math.min(Math.max(trend+1,0),2)/2*10)*10)/10;
    // Prediction: simple moving average of last 3 months requests
    const last3vals=months.slice(-3).map(m=>st.monthlyReq[m]||0);
    const predQty=last3vals.length>0?Math.round(last3vals.reduce((a,v)=>a+v,0)/last3vals.length):0;
    // Monthly trend data for sparkline
    const trendData=months.map(m=>st.monthlyReq[m]||0);
    return{
      ...st,harga,frequency,avgReqPerMonth:Math.round(avgReqPerMonth),billRate,recency,trend,score,predQty,
      activeMonths,totalMonths,trendData,months:months,estNilai:predQty*harga,
      label:score>=70?'hot':score>=40?'warm':'cold'
    };
  }).sort((a,b)=>b.score-a.score);
}

function render(){

  const ae=document.activeElement;
  const wasFocused=ae&&ae.tagName==='INPUT'&&ae.closest('#app');
  const selStart=wasFocused?ae.selectionStart:null;
  const selEnd=wasFocused?ae.selectionEnd:null;
  const focusPlaceholder=wasFocused?ae.getAttribute('placeholder'):null;
  const focusType=wasFocused?ae.getAttribute('type'):null;

  if(S.loading){a.innerHTML='<div class="loading"><div class="spinner"></div><br>Memuat data...</div>';return}
  if(S.tab==='dashboard'){rDash(a);setTimeout(initTrenChart,0);}else if(S.tab==='requests')rReq(a);else if(S.tab==='shipments')rShip(a);else if(S.tab==='billings')rBill(a);else if(S.tab==='aging')rAging(a);else if(S.tab==='demand')rDemand(a);else if(S.tab==='items')rIt(a);else if(S.tab==='converter')rConverter(a);

  // Restore focus after re-render
  if(wasFocused&&focusPlaceholder){

  }
}

  const itemsTanpaHarga=items.filter(i=>i.bT>0&&!(parseFloat(i.harga_default)||0)).length;

  // 2.2 Aging — FIFO: billing habiskan shipment terlama dulu
  const today=new Date();today.setHours(0,0,0,0);
  const aging={a:0,b:0,c:0}; // 0-30, 30-60, >60
  const agingReqIds=[...new Set(S.shipments.map(s=>s.request_id))];
  agingReqIds.forEach(rid=>{

    const ships=S.shipments.filter(s=>s.request_id===rid).sort((a,b)=>a.ship_date.localeCompare(b.ship_date));
    let sisaBilled=req.tB;
    ships.forEach(s=>{

      const unbilled=s.qty-sisaBilled;sisaBilled=0;
      const tglKirim=new Date(s.ship_date);
      const hari=Math.floor((today-tglKirim)/(1000*60*60*24));
      if(hari<=30)aging.a+=unbilled;else if(hari<=60)aging.b+=unbilled;else aging.c+=unbilled;

function rShip(a){
  const rs=rqS(),q=S.search.toLowerCase();

  S.shipments.forEach(s=>{
    const req=rs.find(r=>r.id===s.request_id);

    if(q&&!s.surat_jalan.toLowerCase().includes(q)&&!req.item_code.toLowerCase().includes(q)&&!req.desc.toLowerCase().includes(q))return;

function initTrenChart(){
  const el=document.getElementById('trenChart');
  if(!el)return;
  if(typeof Chart==='undefined'){
    el.parentElement.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--t3);font-size:12px">Grafik tidak tersedia — Chart.js gagal dimuat</div>';
    return;
  }
  const existing=Chart.getChart(el);
  if(existing)existing.destroy();
  const labels=el.dataset.labels.split('|');
  const diminta=el.dataset.diminta.split(',').map(Number);
  const dikirim=el.dataset.dikirim.split(',').map(Number);
  const tertagih=el.dataset.tertagih.split(',').map(Number);
  const tc='#64748b',gc='rgba(255,255,255,0.06)';
  new Chart(el,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Diminta',data:diminta,backgroundColor:'rgba(59,130,246,0.7)',borderRadius:3,borderSkipped:false},
      {label:'Dikirim',data:dikirim,backgroundColor:'rgba(34,197,94,0.7)',borderRadius:3,borderSkipped:false},
      {label:'Tertagih',data:tertagih,backgroundColor:'rgba(245,158,11,0.7)',borderRadius:3,borderSkipped:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:tc,font:{size:11},boxWidth:10,padding:12}},
        tooltip:{backgroundColor:'#1a1d27',titleColor:'#e2e8f0',bodyColor:'#94a3b8',padding:10,
          callbacks:{label:ctx=>' '+ctx.dataset.label+': '+ctx.parsed.y.toLocaleString()+' pcs'}}
      },
      scales:{
        x:{grid:{display:false},ticks:{color:tc,font:{size:11}}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v}}
      }
    }
  });
}

// 🔄 KONVERTER KODE — User Code ↔ Kennametal Code
// ══════════════════════════════════════════════════════════════

// State konverter (terpisah dari S global)
const CV = {
  mappings: [],          // data dari supabase item_mapping
  loaded: false,
  loading: false,
  search: '',
  tab: 'converter',      // sub-tab: 'converter' | 'manage'
  form: {                // form tambah/edit mapping
    id: null,
    user_code: '',
    description: '',
    kennametal_id: '',
    kennametal_catalog: '',
    grade: '',
    notes: ''
  },
  formOpen: false,
  saving: false,
  result: null,          // hasil konversi satu kode
  batchInput: '',        // input batch (multi-line)
  batchResults: [],      // hasil batch
  batchDone: false,
};

async function cvLoad() {
  if (CV.loading) return;
  CV.loading = true;
  const { data, error } = await db.from('item_mapping').select('*').order('user_code');
  CV.loading = false;
  CV.loaded = true;
  if (!error) CV.mappings = data || [];
  else toast('Gagal memuat data mapping: ' + error.message, 'err');
  if (S.tab === 'converter') rConverter(document.getElementById('app'));
}

function cvFind(code) {
  if (!code) return null;
  const upper = code.trim().toUpperCase();
  return CV.mappings.find(m => m.user_code.toUpperCase() === upper) || null;
}

function cvConvert() {
  const inp = document.getElementById('cv-single-input');
  if (!inp) return;
  const code = inp.value.trim();
  if (!code) { CV.result = null; rConverter(document.getElementById('app')); return; }
  CV.result = { input: code, match: cvFind(code) };
  rConverter(document.getElementById('app'));
}

function cvBatch() {
  const inp = document.getElementById('cv-batch-input');
  if (!inp) return;
  const raw = inp.value.trim();
  if (!raw) return;
  const lines = raw.split(/[\n,;]+/).map(l => l.trim()).filter(Boolean);
  CV.batchResults = lines.map(code => ({ input: code, match: cvFind(code) }));
  CV.batchDone = true;
  rConverter(document.getElementById('app'));
}

function cvCopyResult(text) {
  navigator.clipboard.writeText(text).then(() => toast('Disalin!'));
}

function cvExportBatch() {
  if (!CV.batchResults.length) return;
  const rows = [['Kode User', 'Deskripsi', 'Kode Kennametal (ID)', 'Kennametal Catalog', 'Grade', 'Status']];
  CV.batchResults.forEach(r => {
    const m = r.match;
    rows.push([
      r.input,
      m ? (m.description || '') : '',
      m ? (m.kennametal_id || '-') : '',
      m ? (m.kennametal_catalog || '-') : '',
      m ? (m.grade || '-') : '',
      m ? 'Ditemukan' : 'Tidak Ditemukan'
    ]);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:40},{wch:20},{wch:28},{wch:12},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, 'Hasil Konversi');
  XLSX.utils.writeFile(wb, 'hasil_konversi_kode.xlsx');
}

function cvOpenForm(mapping) {
  if (mapping) {
    CV.form = { id: mapping.id, user_code: mapping.user_code, description: mapping.description || '',
      kennametal_id: mapping.kennametal_id || '', kennametal_catalog: mapping.kennametal_catalog || '',
      grade: mapping.grade || '', notes: mapping.notes || '' };
  } else {
    CV.form = { id: null, user_code: '', description: '', kennametal_id: '', kennametal_catalog: '', grade: '', notes: '' };
  }
  CV.formOpen = true;
  rConverter(document.getElementById('app'));
}

function cvCloseForm() { CV.formOpen = false; rConverter(document.getElementById('app')); }

async function cvSaveForm() {
  const f = CV.form;
  if (!f.user_code.trim()) { toast('Kode User wajib diisi', 'err'); return; }
  CV.saving = true;
  rConverter(document.getElementById('app'));
  const payload = {
    user_code: f.user_code.trim().toUpperCase(),
    description: f.description.trim() || null,
    kennametal_id: f.kennametal_id.trim() || null,
    kennametal_catalog: f.kennametal_catalog.trim() || null,
    grade: f.grade.trim() || null,
    notes: f.notes.trim() || null,
    updated_at: new Date().toISOString()
  };
  let error;
  if (f.id) {
    ({ error } = await db.from('item_mapping').update(payload).eq('id', f.id));
  } else {
    ({ error } = await db.from('item_mapping').insert(payload));
  }
  CV.saving = false;
  if (error) { toast(errMsg(error), 'err'); CV.saving = false; rConverter(document.getElementById('app')); return; }
  toast(f.id ? 'Mapping diupdate' : 'Mapping ditambahkan');
  CV.formOpen = false;
  await cvLoad();
}

async function cvDelete(id, code) {
  if (!confirm('Hapus mapping untuk ' + code + '?')) return;
  const { error } = await db.from('item_mapping').delete().eq('id', id);
  if (error) { toast(errMsg(error), 'err'); return; }
  toast('Dihapus');
  await cvLoad();
}

          </div>
          <div class="fd">
            <label>Kode Kennametal (ID 7 angka)</label>
            <input value="${$(CV.form.kennametal_id)}" oninput="CV.form.kennametal_id=this.value" placeholder="Contoh: 3769415">
          </div>
          <div class="fd">
            <label>Kennametal Catalog Name</label>
            <input value="${$(CV.form.kennametal_catalog)}" oninput="CV.form.kennametal_catalog=this.value" placeholder="Contoh: CCMT060208FP">
          </div>
          <div class="fd">
            <label>Grade</label>
            <input value="${$(CV.form.grade)}" oninput="CV.form.grade=this.value" placeholder="Contoh: KCU25">
          </div>
          <div class="fd">
            <label>Catatan</label>
            <input value="${$(CV.form.notes)}" oninput="CV.form.notes=this.value" placeholder="Opsional">
          </div>
        </div>
        <div class="ma">
          <button class="btn btn-g" onclick="cvCloseForm()" ${CV.saving ? 'disabled' : ''}>Batal</button>
          <button class="btn btn-p" onclick="cvSaveForm()" ${CV.saving ? 'disabled style="opacity:.6"' : ''}>
            ${CV.saving ? '<span class="spinner" style="display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:4px"></span>Menyimpan...' : (CV.form.id ? 'Update' : 'Simpan')}
          </button>
        </div>
      </div>
    </div>` : '';

  // ── Result card for single convert ──
  function resultCard(res) {
    if (!res) return '';
    const m = res.match;
    if (!m) return `
      <div style="background:var(--rd);border:1px solid var(--r);border-radius:8px;padding:14px 16px;margin-top:10px">
        <div style="font-size:13px;font-weight:700;color:var(--r)">❌ Tidak ditemukan</div>
        <div style="font-size:12px;color:var(--t2);margin-top:4px">Kode "<b>${$(res.input)}</b>" tidak ada di database mapping.<br>
        Klik <b>Kelola Mapping</b> untuk menambahkan padanannya.</div>
      </div>`;
    return `
      <div style="background:var(--gd);border:1px solid var(--g);border-radius:8px;padding:14px 16px;margin-top:10px">
        <div style="font-size:11px;color:var(--g);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">✅ Ditemukan</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Kode User</div>
            <div style="font-size:15px;font-weight:700;color:var(--t)">${$(m.user_code)}</div></div>
          <div><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Kode Kennametal</div>
            <div style="display:flex;align-items:center;gap:6px">
              <div style="font-size:15px;font-weight:700;color:var(--am)">${$(m.kennametal_id || '—')}</div>
              ${m.kennametal_id ? `<button class="btn btn-g" style="padding:2px 8px;font-size:10px" onclick="cvCopyResult('${$(m.kennametal_id)}')">📋 Salin</button>` : ''}
            </div></div>
          ${m.description ? `<div style="grid-column:1/-1"><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Deskripsi</div>
            <div style="font-size:12px;color:var(--t2)">${$(m.description)}</div></div>` : ''}
          ${m.kennametal_catalog ? `<div><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Catalog Name</div>
            <div style="font-size:12px;color:var(--t)">${$(m.kennametal_catalog)}</div></div>` : ''}
          ${m.grade ? `<div><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Grade</div>
            <div style="font-size:12px;color:var(--t)">${$(m.grade)}</div></div>` : ''}
          ${m.notes ? `<div style="grid-column:1/-1"><div style="font-size:10px;color:var(--t3);text-transform:uppercase">Catatan</div>
            <div style="font-size:12px;color:var(--t2);font-style:italic">${$(m.notes)}</div></div>` : ''}
        </div>
      </div>`;
  }

  // ── Batch result rows ──
  function batchRows() {
    if (!CV.batchDone || !CV.batchResults.length) return '';
    const found = CV.batchResults.filter(r => r.match).length;
    const notFound = CV.batchResults.length - found;
    return `
      <div style="margin-top:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div style="font-size:12px;color:var(--t2)">
            <span style="color:var(--g);font-weight:600">${found} ditemukan</span>
            ${notFound > 0 ? ` · <span style="color:var(--r);font-weight:600">${notFound} tidak ditemukan</span>` : ''}
          </div>
          <button class="btn btn-s" onclick="cvExportBatch()" style="font-size:11px">📥 Export Excel</button>
        </div>
        <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr>
            <th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bdr)">Kode User</th>
            <th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bdr)">Deskripsi</th>
            <th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bdr)">Kode Kennametal</th>
            <th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bdr)">Grade</th>
            <th style="padding:6px 8px;text-align:left;font-size:10px;color:var(--t3);border-bottom:1px solid var(--bdr)">Status</th>
          </tr></thead>
          <tbody>${CV.batchResults.map(r => {
            const m = r.match;
            return `<tr style="background:${m ? 'transparent' : 'var(--rd)'}">
              <td style="padding:5px 8px;border-bottom:1px solid var(--bdr);font-weight:600">${$(r.input)}</td>
              <td style="padding:5px 8px;border-bottom:1px solid var(--bdr);color:var(--t2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m ? $(m.description || '') : ''}</td>
              <td style="padding:5px 8px;border-bottom:1px solid var(--bdr)">
                ${m && m.kennametal_id ? `<span style="font-weight:600;color:var(--am)">${$(m.kennametal_id)}</span>
                  <button class="btn btn-g" style="padding:1px 6px;font-size:10px;margin-left:4px" onclick="cvCopyResult('${$(m.kennametal_id)}')">📋</button>` : (m ? '<span style="color:var(--t3)">—</span>' : '<span style="color:var(--r)">Tidak ada</span>')}
              </td>
              <td style="padding:5px 8px;border-bottom:1px solid var(--bdr);color:var(--t2)">${m ? $(m.grade || '') : ''}</td>
              <td style="padding:5px 8px;border-bottom:1px solid var(--bdr)">
                ${m ? '<span class="bg bg-g">✓ Ada</span>' : '<span class="bg bg-r">✗ Tidak Ada</span>'}
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>
      </div>`;
  }

  // ── Stats header ──
  const totalM = CV.mappings.length;
  const withKennametal = CV.mappings.filter(m => m.kennametal_id).length;
  const withoutKennametal = totalM - withKennametal;

  a.innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px">
    <div>
      <div style="font-size:18px;font-weight:700">🔄 Konverter Kode Item</div>
      <div style="font-size:12px;color:var(--t3)">Cocokkan kode user (Yanmar) dengan kode Kennametal secara otomatis</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:var(--ac)">${totalM}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Total Mapping</div>
      </div>
      <div style="background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:var(--g)">${withKennametal}</div>
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase">Ada Kode</div>
      </div>
      ${withoutKennametal > 0 ? `<div style="background:var(--amd);border:1px solid var(--am);border-radius:8px;padding:8px 14px;text-align:center">
        <div style="font-size:18px;font-weight:700;color:var(--am)">${withoutKennametal}</div>
        <div style="font-size:10px;color:var(--am);text-transform:uppercase">Belum Lengkap</div>
      </div>` : ''}
    </div>
  </div>

  ${CV.loading ? '<div class="loading"><div class="spinner"></div><br>Memuat database mapping...</div>' : `

  <!-- ── PANEL ATAS: Konverter ── -->
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">

    <!-- Konversi Satu Kode -->
    <div class="pnl" style="flex:1;min-width:280px;margin-bottom:0">
      <div class="pnl-t">🔍 Konversi Satu Kode</div>
      <div style="display:flex;gap:8px">
        <input id="cv-single-input" placeholder="Ketik kode user, misal: JCR0067"
          style="flex:1;padding:9px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none"
          oninput="if(this.value.trim()===''){CV.result=null;rConverter(document.getElementById('app'))}"
          onkeydown="if(event.key==='Enter')cvConvert()"
          value="${CV.result ? $(CV.result.input) : ''}">
        <button class="btn btn-p" onclick="cvConvert()">Cari →</button>
      </div>
      ${resultCard(CV.result)}
    </div>

    <!-- Konversi Banyak Sekaligus -->
    <div class="pnl" style="flex:1;min-width:280px;margin-bottom:0">
      <div class="pnl-t">📋 Konversi Banyak Sekaligus</div>
      <div style="font-size:11px;color:var(--t3);margin-bottom:6px">Masukkan beberapa kode user (pisahkan dengan baris baru atau koma)</div>
      <textarea id="cv-batch-input" rows="4" placeholder="JCR0067&#10;JI10015&#10;JCR0164&#10;JD10083"
        style="width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:12px;font-family:monospace;outline:none;resize:vertical">${CV.batchInput}</textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px;gap:8px">
        <button class="btn btn-g" onclick="CV.batchResults=[];CV.batchDone=false;CV.batchInput='';document.getElementById('cv-batch-input').value='';rConverter(document.getElementById('app'))">Reset</button>
        <button class="btn btn-p" onclick="CV.batchInput=document.getElementById('cv-batch-input').value;cvBatch()">Konversi →</button>
      </div>
      ${batchRows()}
    </div>
  </div>

  <!-- ── PANEL BAWAH: Kelola Mapping ── -->
  <div class="pnl">
    <div class="pnl-t" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>🗄️ Kelola Database Mapping</span>
      <button class="btn btn-p" onclick="cvOpenForm(null)" style="font-size:12px">+ Tambah Mapping</button>
    </div>
    <div class="tb" style="margin-bottom:12px">
      <input placeholder="Cari kode user / deskripsi / kode kennametal..."
        value="${$(CV.search)}"
        oninput="CV.search=this.value;rConverter(document.getElementById('app'))"
        style="flex:1;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none">
    </div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:8px">${filtered.length} dari ${totalM} mapping</div>
    <div class="tw">
    <table>
      <thead><tr>
        <th>Kode User</th>
        <th>Deskripsi</th>
        <th>Kode Kennametal</th>
        <th>Catalog Name</th>
        <th>Grade</th>
        <th>Catatan</th>
        <th></th>
      </tr></thead>
      <tbody>${filtered.map(m => `<tr class="trh">
        <td class="b nw" style="color:var(--ac)">${$(m.user_code)}</td>
        <td class="ell" style="max-width:200px;color:var(--t2)">${$(m.description || '')}</td>
        <td class="nw">
          ${m.kennametal_id
            ? `<span style="font-weight:700;color:var(--am)">${$(m.kennametal_id)}</span>
               <button class="btn btn-g" style="padding:1px 6px;font-size:10px;margin-left:4px" onclick="cvCopyResult('${$(m.kennametal_id)}')">📋</button>`
            : '<span style="color:var(--t3);font-style:italic">belum ada</span>'}
        </td>
        <td style="color:var(--t2);font-size:11px">${$(m.kennametal_catalog || '')}</td>
        <td><span class="bg bg-b" style="font-size:10px">${$(m.grade || '')}</span></td>
        <td style="color:var(--t3);font-size:11px;font-style:italic">${$(m.notes || '')}</td>
        <td class="nw">
          <button class="btn btn-g" style="padding:3px 8px;font-size:11px" onclick="cvOpenForm(${JSON.stringify(m).replace(/"/g,'&quot;')})">✏️</button>
          <button class="btn btn-d" style="padding:3px 8px;font-size:11px;margin-left:4px" onclick="cvDelete(${m.id},'${$(m.user_code)}')">🗑</button>
        </td>
      </tr>`).join('')}
      ${filtered.length === 0 ? '<tr><td colspan="7" class="empty">Tidak ada data</td></tr>' : ''}
      </tbody>
    </table>
    </div>
  </div>
  `}
  ${formModal}`;

  // Restore single input value after re-render
  const inp = document.getElementById('cv-single-input');
  if (inp && CV.result) inp.value = CV.result.input;
}

load();
</script>
</body>
</html>
