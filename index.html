<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#0f1117;--card:#1a1d27;--c2:#21242f;--bdr:#2a2d3a;--ac:#3b82f6;--acd:#1e3a5f;--g:#22c55e;--gd:#14532d;--am:#f59e0b;--amd:#78350f;--r:#ef4444;--rd:#7f1d1d;--t:#e2e8f0;--t2:#94a3b8;--t3:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.hdr{background:var(--card);border-bottom:1px solid var(--bdr);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

.pnl{background:var(--card);border-radius:10px;border:1px solid var(--bdr);padding:20px;margin-bottom:16px}.pnl-t{font-size:15px;font-weight:700;margin-bottom:16px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:var(--t3);font-weight:600;font-size:11px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--bdr)}

.r{text-align:right}.b{font-weight:600}.nw{white-space:nowrap}

.bg-b{background:var(--acd);color:var(--ac)}.bg-g{background:var(--gd);color:var(--g)}.bg-a{background:var(--amd);color:var(--am)}.bg-r{background:var(--rd);color:var(--r)}

.tb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.tb input,.tb select{flex:1;min-width:140px;padding:8px 12px;background:var(--card);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.mh{font-size:14px;font-weight:700;color:var(--ac);margin-bottom:8px;padding:4px 0;border-bottom:2px solid var(--acd)}
.pw{width:100px}.pb{background:var(--bg);border-radius:4px;height:6px;overflow:hidden}.pf{height:100%;border-radius:4px;transition:width .3s}.pl{font-size:10px;color:var(--t3);margin-top:2px}

.ds{margin-bottom:12px}.ds:last-child{margin-bottom:0}
.dt{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.dtb{width:100%;font-size:11px;border-collapse:collapse}.dtb th{padding:4px 8px;font-size:10px;border-bottom:1px solid var(--bdr);color:var(--t3)}.dtb td{padding:4px 8px;border-bottom:1px solid var(--bdr)}
.de{font-size:11px;color:var(--t3);font-style:italic;padding:4px 0}
.eb{cursor:pointer;user-select:none;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:10px;background:var(--c2);color:var(--t2);border:1px solid var(--bdr);transition:.15s}.eb:hover{background:var(--acd);color:var(--ac)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000}
.md{background:var(--card);border-radius:12px;padding:24px;width:700px;max-width:95vw;border:1px solid var(--bdr);max-height:92vh;overflow-y:auto}
.md h3{margin-bottom:16px;font-size:16px}
.fd{margin-bottom:12px}.fd label{font-size:12px;color:var(--t2);display:block;margin-bottom:4px}
.fd input,.fd select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--t);font-size:13px;font-family:inherit;outline:none}
.fd-h{font-size:11px;color:var(--t3);margin-top:2px}
.srw{position:relative}.srl{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--bdr);border-radius:0 0 6px 6px;max-height:180px;overflow-y:auto;z-index:10}
.sri{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--bdr)}.sri:hover{background:var(--c2)}.sri .c{font-weight:600;color:var(--t)}.sri .d{color:var(--t3);font-size:11px;margin-left:6px}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.dc{display:inline-flex;align-items:center;gap:4px;background:var(--rd);border:1px solid var(--r);border-radius:6px;padding:2px 4px}.dc .btn{font-size:11px;padding:3px 8px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;animation:sU .3s ease}
.toast-ok{background:var(--gd);color:var(--g);border:1px solid rgba(34,197,94,.25)}.toast-err{background:var(--rd);color:var(--r);border:1px solid rgba(239,68,68,.25)}
@keyframes sU{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.import-preview table{font-size:11px}.import-preview th{font-size:10px;padding:4px 6px}.import-preview td{padding:4px 6px}

.drop-zone:hover,.drop-zone.over{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.drop-zone input{display:none}

@media(max-width:640px){.hdr{flex-direction:column;align-items:flex-start}.sc-v{font-size:20px}.sc{min-width:100px}.md{width:98vw}}

<body>
<div class="hdr"><div><div class="hdr-t">Konsinyasi Tracker</div><div class="hdr-s">PT Philo Teknik → PT Yanmar Diesel Indonesia</div></div>
<div class="tabs"><button class="tab on" data-t="dashboard" onclick="go('dashboard')">◉ Dashboard</button><button class="tab" data-t="requests" onclick="go('requests')">📋 Request</button><button class="tab" data-t="shipments" onclick="go('shipments')">🚚 Pengiriman</button><button class="tab" data-t="billings" onclick="go('billings')">💰 Penagihan</button><button class="tab" data-t="items" onclick="go('items')">📦 Ringkasan</button></div></div>
<div class="wrap" id="app"><div class="loading"><div class="spinner"></div><br>Memuat data...</div></div>
<div id="mr"></div>
<script>
const SU='https://epmwxihwftcjgqqpzkme.supabase.co',SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbXd4aWh3ZnRjamdxcXB6a21lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Mzg5MzAsImV4cCI6MjA5MDUxNDkzMH0.R8nyhlNq4adtWkeAuvXQJoXYA1WKrauUihkjvmZ8LDw';
const db=supabase.createClient(SU,SK);
let S={tab:'dashboard',items:[],requests:[],shipments:[],billings:[],search:'',fM:'all',exp:{},loading:true,modal:null,dc:null,saving:false};

async function load(){S.loading=true;render();try{const[a,b,c,d]=await Promise.all([db.from('items').select('*').order('code'),db.from('requests').select('*').order('month').order('id'),db.from('shipments').select('*').order('ship_date'),db.from('billings').select('*').order('id')]);S.items=a.data||[];S.requests=b.data||[];S.shipments=c.data||[];S.billings=d.data||[]}catch(x){toast(x.message,'err')}S.loading=false;render()}

function rqS(){return S.requests.map(r=>{const sh=S.shipments.filter(s=>s.request_id===r.id).reduce((a,s)=>a+s.qty,0),bl=S.billings.filter(b=>b.request_id===r.id).reduce((a,b)=>a+b.qty,0),it=S.items.find(i=>i.code===r.item_code);return{...r,desc:it?.description||r.item_code,tS:sh,sR:r.qty_requested-sh,tB:bl,bT:sh-bl}})}
function itS(){const rs=rqS();return S.items.map(i=>{const rr=rs.filter(r=>r.item_code===i.code);const tShip=rr.reduce((a,r)=>a+r.tS,0),tBill=rr.reduce((a,r)=>a+r.tB,0),bT=tShip-tBill;const harga=parseFloat(i.harga_default)||0;return{...i,tReq:rr.reduce((a,r)=>a+r.qty_requested,0),tShip,tBill,bT,estNilai:bT*harga,mos:[...new Set(rr.map(r=>r.month))]}}).filter(i=>i.tReq>0)}
function fmRp(v){if(v>=1e9)return'Rp '+(v/1e9).toFixed(1).replace('.',',')+'M';if(v>=1e6)return'Rp '+(v/1e6).toFixed(1).replace('.',',')+'jt';if(v>=1e3)return'Rp '+(v/1e3).toFixed(0)+'rb';return'Rp '+Math.round(v).toLocaleString('id-ID');}
function fmRpFull(v){return'Rp '+Math.round(v).toLocaleString('id-ID');}
function aM(){return[...new Set(S.requests.map(r=>r.month))].sort()}
function fm(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][parseInt(mo)]+' '+y}
function $(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function go(t){S.tab=t;S.search='';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));render()}
function toast(m,t='ok'){const el=document.createElement('div');el.className=`toast toast-${t}`;el.textContent=m;document.body.appendChild(el);setTimeout(()=>el.remove(),3500)}
function tog(id){S.exp[id]=!S.exp[id];render()}
function askD(t,id){S.dc={t,id};render()}
function canD(){S.dc=null;render()}
async function doD(t,id){if(t==='requests'){await db.from('shipments').delete().eq('request_id',id);await db.from('billings').delete().eq('request_id',id)}await db.from(t).delete().eq('id',id);S.dc=null;toast('Dihapus');await load()}

// ── Modal System ──
function openM(t,d,eid){S.modal={t,d,eid:eid||null,is:'',sl:false};rM()}
function closeM(){S.modal=null;document.getElementById('mr').innerHTML=''}
function uM(k,v){S.modal.d[k]=v;rM()}

// ── Error message helper (Task 1.3) ──
function errMsg(e){
  if(!e||!e.message)return'Terjadi kesalahan';
  const m=e.message;
  if(m.includes('not-null')||m.includes('null value'))return'Data tidak lengkap, periksa kembali isian';
  if(m.includes('unique')||m.includes('duplicate'))return'Data sudah ada, tidak bisa duplikat';
  if(m.includes('foreign key')||m.includes('violates foreign'))return'Data referensi tidak ditemukan';
  if(m.includes('network')||m.includes('fetch'))return'Koneksi gagal, coba lagi';
  if(m.includes('JWT')||m.includes('auth'))return'Sesi habis, muat ulang halaman';
  return'Gagal menyimpan data';
}

// ── Loading state helper (Task 1.1) ──
function setBusy(busy){
  S.saving=busy;
  document.querySelectorAll('.btn-p[onclick*="save"],#save-btn').forEach(b=>{
    b.disabled=busy;
    b.style.opacity=busy?'0.6':'1';
    b.style.cursor=busy?'not-allowed':'pointer';
  });
}

// ── Single save (for edit/single add) ──
async function saveM(){
  const{t,d,eid}=S.modal;let err;
  if(t==='item'){
    if(!d.code||!d.description){toast('Isi semua field','err');return}
    if(eid)({error:err}=await db.from('items').update({code:d.code.toUpperCase(),description:d.description.toUpperCase()}).eq('id',eid));
    else({error:err}=await db.from('items').insert({code:d.code.toUpperCase(),description:d.description.toUpperCase()}));
  }else if(t==='request'){
    if(!d.month||!d.item_code||d.qty_requested<=0){toast('Isi semua field','err');return}
    const o={request_number:d.request_number||null,month:d.month,item_code:d.item_code,end_stock:d.end_stock||0,qty_requested:d.qty_requested};
    if(eid)({error:err}=await db.from('requests').update(o).eq('id',eid));else({error:err}=await db.from('requests').insert(o));
  }else if(t==='shipment'){
    if(!d.request_id||!d.ship_date||!d.surat_jalan||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):req?.sR||0;
    if(d.qty>mx){toast(`Melebihi sisa (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:d.qty};
    if(eid)({error:err}=await db.from('shipments').update(o).eq('id',eid));else({error:err}=await db.from('shipments').insert(o));
  }else if(t==='billing'){
    if(!d.request_id||!d.po_number||d.qty<=0){toast('Isi semua field','err');return}
    const rs=rqS(),req=rs.find(r=>r.id==d.request_id);
    const mx=eid?req.bT+(S.billings.find(b=>b.id===eid)?.qty||0):req?.bT||0;
    if(d.qty>mx){toast(`Melebihi belum tertagih (${mx})`,'err');return}
    const o={request_id:parseInt(d.request_id),po_number:d.po_number,qty:d.qty,billing_date:d.billing_date||null};
    if(eid)({error:err}=await db.from('billings').update(o).eq('id',eid));else({error:err}=await db.from('billings').insert(o));
  }
  if(err){toast(errMsg(err),'err');return}
  toast(eid?'Diupdate':'Ditambahkan');closeM();await load();
}

// ── Batch Shipment Save ── (Task 1.1: loading state)
async function saveBatchShip(){
  const d=S.modal.d;
  if(!d.ship_date||!d.surat_jalan){toast('Isi tanggal dan no. surat jalan','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}
  const rs=rqS();
  for(const row of rows){
    const req=rs.find(r=>r.id===row.request_id);
    if(req&&row.qty>req.sR){toast(`${req.item_code}: melebihi sisa (${req.sR})`,'err');return}
  }
  setBusy(true);
  const inserts=rows.map(r=>({request_id:r.request_id,ship_date:d.ship_date,surat_jalan:d.surat_jalan,qty:r.qty}));
  const{error}=await db.from('shipments').insert(inserts);
  setBusy(false);
  if(error){toast(errMsg(error),'err');return}
  toast(`${rows.length} pengiriman dicatat`);closeM();await load();
}

// ── Batch Billing Save ── (Task 1.1: loading state)
async function saveBatchBill(){
  const d=S.modal.d;
  if(!d.po_number){toast('Isi no. PO/Invoice','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}
  const rs=rqS();
  for(const row of rows){
    const req=rs.find(r=>r.id===row.request_id);
    if(req&&row.qty>req.bT){toast(`${req.item_code}: melebihi belum tertagih (${req.bT})`,'err');return}
  }
  setBusy(true);
  const inserts=rows.map(r=>({request_id:r.request_id,po_number:d.po_number,qty:r.qty,billing_date:d.billing_date||null}));
  const{error}=await db.from('billings').insert(inserts);
  setBusy(false);
  if(error){toast(errMsg(error),'err');return}
  toast(`${rows.length} penagihan dicatat`);closeM();await load();
}

// ── Import Request from Excel ──
function openImport(){
  S.modal={t:'import',d:{rows:[],request_number:'',month:''},is:'',sl:false};rM();
}

function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1});
      // Find header row (look for ITEM CODE or similar)
      let hdrIdx=-1;
      for(let i=0;i<Math.min(json.length,10);i++){
        const row=json[i].map(c=>String(c||'').toUpperCase());
        if(row.some(c=>c.includes('ITEM CODE')||c.includes('ITEM_CODE'))){hdrIdx=i;break}
      }
      if(hdrIdx===-1){toast('Header "ITEM CODE" tidak ditemukan','err');return}
      const hdr=json[hdrIdx].map(c=>String(c||'').toUpperCase().trim());
      const iCode=hdr.findIndex(h=>h.includes('ITEM CODE')||h.includes('ITEM_CODE'));
      const iDesc=hdr.findIndex(h=>h.includes('DESC'));
      const iEnd=hdr.findIndex(h=>h.includes('END STOCK')||h.includes('STOCK'));
      const iQty=hdr.findIndex(h=>h.includes('QTY')||h.includes('REQUESTED'));
      if(iCode===-1||iQty===-1){toast('Kolom ITEM CODE atau QTY tidak ditemukan','err');return}

      const rows=[];
      for(let i=hdrIdx+1;i<json.length;i++){
        const r=json[i];if(!r||!r[iCode])continue;
        const code=String(r[iCode]).trim().toUpperCase();
        if(!code||code==='NO.'||code==='NO')continue;
        rows.push({
          item_code:code,
          description:iDesc>=0?String(r[iDesc]||'').trim():'',
          end_stock:iEnd>=0?parseInt(r[iEnd])||0:0,
          qty_requested:parseInt(r[iQty])||0,
          checked:true,
          isNew:!S.items.find(it=>it.code===code)
        });
      }
      if(rows.length===0){toast('Tidak ada data valid','err');return}
      S.modal.d.rows=rows;
      toast(`${rows.length} item ditemukan`);
      rM();
    }catch(ex){toast('Gagal baca file: '+ex.message,'err')}
  };
  reader.readAsArrayBuffer(file);
}

async function saveImport(){
  const d=S.modal.d;
  if(!d.month){toast('Pilih bulan','err');return}
  const rows=d.rows.filter(r=>r.checked&&r.qty_requested>0);
  if(rows.length===0){toast('Pilih minimal 1 item','err');return}
  const newItems=rows.filter(r=>r.isNew);
  if(newItems.length>0){
    const unique=[...new Map(newItems.map(i=>[i.item_code,i])).values()];
    const{error}=await db.from('items').insert(unique.map(i=>({code:i.item_code,description:i.description||i.item_code})));
    if(error&&!error.message.includes('duplicate')){toast(errMsg(error),'err');return}
    const{data}=await db.from('items').select('*').order('code');
    S.items=data||[];
  }
  setBusy(true);
  const inserts=rows.map(r=>({request_number:d.request_number||null,month:d.month,item_code:r.item_code,end_stock:r.end_stock,qty_requested:r.qty_requested}));
  const{error}=await db.from('requests').insert(inserts);
  setBusy(false);
  if(error){toast(errMsg(error),'err');return}
  toast(`${rows.length} request diimport`);closeM();await load();
}

function render(){
  const a=document.getElementById('app');

  if(S.tab==='dashboard')rDash(a);else if(S.tab==='requests')rReq(a);else if(S.tab==='shipments')rShip(a);else if(S.tab==='billings')rBill(a);else if(S.tab==='items')rIt(a);

function rDash(a){

  const pS=rs.filter(r=>r.sR>0).length,pB=rs.filter(r=>r.bT>0).length;
  const items=itS();
  const iS=items.filter(i=>i.bT>0).sort((a,b)=>b.bT-a.bT).slice(0,8);

  // 2.1 Estimasi nilai Rp
  const estTotal=items.reduce((s,i)=>s+i.estNilai,0);
  const itemsTanpaHarga=items.filter(i=>i.bT>0&&!(parseFloat(i.harga_default)||0)).length;

  const today=new Date();today.setHours(0,0,0,0);

  S.shipments.forEach(s=>{
    const req=rs.find(r=>r.id===s.request_id);
    if(!req||req.bT<=0)return;
    const tglKirim=new Date(s.ship_date);
    const hari=Math.floor((today-tglKirim)/(1000*60*60*24));
    // proporsi belum tertagih per shipment (estimasi sederhana)
    const ratio=req.tS>0?Math.min(s.qty,req.bT)/req.tS:0;
    const pcs=Math.round(s.qty*ratio);
    if(hari<=30)aging.a+=pcs;else if(hari<=60)aging.b+=pcs;else aging.c+=pcs;

function rShip(a){
  const rs=rqS(),q=S.search.toLowerCase();
  // Kelompokkan shipments per surat jalan, filter
  const sjMap={};
  S.shipments.forEach(s=>{
    const req=rs.find(r=>r.id===s.request_id);
    if(!req)return;
    if(S.fM!=='all'&&req.month!==S.fM)return;
    if(q&&!s.surat_jalan.toLowerCase().includes(q)&&!req.item_code.toLowerCase().includes(q)&&!req.desc.toLowerCase().includes(q))return;

  });

  </div>

      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--bdr);border-radius:${x?'8px 8px 0 0':'8px'};cursor:pointer" onclick="S.exp['sj_${$(sj.sj)}']=!S.exp['sj_${$(sj.sj)}'];render()">

          <span class="b" style="font-size:13px">${$(sj.sj)}</span>
          <span style="font-size:11px;color:var(--t3);margin-left:8px">${sj.tgl}</span>

        <span style="font-size:11px;color:var(--t3)">${sj.items.length} item</span>

          ${sj.items.map(s=>{const isDs=S.dc&&S.dc.t==='shipments'&&S.dc.id===s.id;const req=rqS().find(r=>r.id===s.request_id);

            </tr>`;}).join('')}
        </tbody></table>
      </div>`:''}
    </div>`;
  }).join('')}`;
}

function rBill(a){

        <button class="eb">${x?'▼':'▶'}</button>
        <div style="flex:1">
          <span class="b" style="font-size:13px">${$(inv.po)}</span>
          <span style="font-size:11px;color:var(--t3);margin-left:8px">${inv.tgl||'-'}</span>

        <span style="font-size:11px;color:var(--t3)">${inv.items.length} item</span>
      </div>
      ${x?`<div style="background:var(--c2);border:1px solid var(--bdr);border-top:none;border-radius:0 0 8px 8px;padding:4px 0">
        <table class="dtb"><thead><tr><th style="padding:6px 14px">Bulan</th><th>Item</th><th>Deskripsi</th><th class="r">Qty</th><th>Aksi</th></tr></thead><tbody>
          ${inv.items.map(b=>{const isDb=S.dc&&S.dc.t==='billings'&&S.dc.id===b.id;const req=rqS().find(r=>r.id===b.request_id);
            return`<tr><td style="padding:6px 14px"><span class="bg bg-b">${fm(b.month)}</span></td>
            <td class="b nw">${$(b.item_code)}</td>
            <td class="ell" style="color:var(--t2);max-width:200px">${$(b.desc)}</td>
            <td class="r b" style="color:var(--am)">${b.qty}</td>
            <td class="nw" style="padding:6px 14px">${isDb?`<div class="dc"><button class="btn btn-d" onclick="doD('billings',${b.id})">Ya</button><button class="btn btn-g" onclick="canD()">×</button></div>`:`<button class="btn btn-g" onclick="openM('billing',{request_id:${b.request_id},po_number:'${$(b.po_number)}',qty:${b.qty},billing_date:'${b.billing_date||''}'},${b.id})">✎</button> <button class="btn btn-d" onclick="askD('billings',${b.id})">✕</button>`}</td>

}

// ── Modal Render ──

  const root=document.getElementById('mr');

  if(t==='item'){
    html=`<h3>${eid?'Edit':'Tambah'} Item</h3>

  }else if(t==='request'){
    html=`<h3>${eid?'Edit':'Tambah'} Request</h3>

    const mx=sel?(isShip?(eid?sel.sR+(S.shipments.find(s=>s.id===eid)?.qty||0):sel.sR):(eid?sel.bT+(S.billings.find(b=>b.id===eid)?.qty||0):sel.bT)):0;
    html=`<h3>${eid?'Edit':'Tambah'} ${isShip?'Pengiriman':'Penagihan'}</h3>
      <div class="fd"><label>Request</label><div class="srw"><input value="${$(is||'')}" placeholder="Cari item..." oninput="S.modal.is=this.value;S.modal.sl=true;rM()" onfocus="S.modal.sl=true;rM()">
        ${S.modal.sl?`<div class="srl">${opts.filter(r=>{const q=(is||'').toLowerCase();return!q||r.item_code.toLowerCase().includes(q)||r.desc.toLowerCase().includes(q)}).slice(0,10).map(r=>`<div class="sri" onclick="S.modal.d.request_id=${r.id};S.modal.is='${fm(r.month)} | ${$(r.item_code)}';S.modal.sl=false;rM()"><span class="c">${fm(r.month)}</span><span class="d">${$(r.item_code)} (${isShip?'sisa:'+r.sR:'blm:'+r.bT})</span></div>`).join('')}</div>`:''}</div>
        ${sel?`<div class="fd-h">✓ ${fm(sel.month)} | ${$(sel.item_code)} — maks: ${mx}</div>`:''}</div>

        <div class="fd"><label>No. Surat Jalan</label><input value="${$(d.surat_jalan||'')}" oninput="uM('surat_jalan',this.value)"></div>`

      <div style="max-height:350px;overflow-y:auto;overflow-x:auto">
      <table class="batch-tbl"><thead><tr><th><input type="checkbox" ${d.rows.every(r=>r.checked)?'checked':''} onchange="S.modal.d.rows.forEach(r=>r.checked=this.checked);rM()"></th><th>Bulan</th><th>Item</th><th>Deskripsi</th><th class="r">Sisa</th><th class="r">Qty Kirim</th></tr></thead>
      <tbody>${d.rows.map((r,i)=>`<tr style="${r.checked?'':'opacity:.4'}">
        <td><input type="checkbox" ${r.checked?'checked':''} onchange="S.modal.d.rows[${i}].checked=this.checked;rM()"></td>
        <td><span class="bg bg-b">${fm(r.month)}</span></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--t2);max-width:150px">${$(r.desc)}</td>
        <td class="r">${r.sisa}</td>
        <td class="r"><input type="number" value="${r.qty}" min="0" max="${r.sisa}" onchange="S.modal.d.rows[${i}].qty=parseInt(this.value)||0" ${r.checked?'':'disabled'}></td>
      </tr>`).join('')}</tbody></table></div>
      <div class="ma"><button class="btn btn-g" onclick="closeM()" ${saving?'disabled':''}>Batal</button><button class="btn btn-p" onclick="saveBatchShip()" ${saving?'disabled style="opacity:.6;cursor:not-allowed"':''} id="save-btn">${saving?'<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px"></span>Menyimpan...':'Simpan '+checked+' Pengiriman'}</button></div>`;
  }else if(t==='batchBill'){
    const checked=d.rows.filter(r=>r.checked).length;
    const saving=S.saving;
    html=`<h3>💰 Batch Penagihan</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap">

      <div style="max-height:350px;overflow-y:auto;overflow-x:auto">

      <tbody>${d.rows.map((r,i)=>`<tr style="${r.checked?'':'opacity:.4'}">
        <td><input type="checkbox" ${r.checked?'checked':''} onchange="S.modal.d.rows[${i}].checked=this.checked;rM()"></td>
        <td><span class="bg bg-b">${fm(r.month)}</span></td>
        <td class="b nw">${$(r.item_code)}</td><td class="ell" style="color:var(--t2);max-width:150px">${$(r.desc)}</td>
        <td class="r">${r.belum}</td>
        <td class="r"><input type="number" value="${r.qty}" min="0" max="${r.belum}" onchange="S.modal.d.rows[${i}].qty=parseInt(this.value)||0" ${r.checked?'':'disabled'}></td>

      <div class="ma"><button class="btn btn-g" onclick="closeM()" ${saving?'disabled':''}>Batal</button><button class="btn btn-p" onclick="saveBatchBill()" ${saving?'disabled style="opacity:.6;cursor:not-allowed"':''} id="save-btn">${saving?'<span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle;margin-right:6px"></span>Menyimpan...':'Simpan '+checked+' Penagihan'}</button></div>`;

        <div class="fd" style="flex:1;min-width:140px"><label>Bulan</label><input type="month" value="${d.month}" onchange="S.modal.d.month=this.value"></div>

        <div style="margin-top:8px"><button class="btn btn-g" onclick="S.modal.d.rows=[];rM()">↩ Pilih file lain</button></div>

      <div class="ma"><button class="btn btn-g" onclick="closeM()">Batal</button>${d.rows.length>0?`<button class="btn btn-p" onclick="saveImport()">Import ${d.rows.filter(r=>r.checked).length} Request</button>`:''}</div>`;

  root.innerHTML=`<div class="mo" onclick="closeM()"><div class="md" onclick="event.stopPropagation()">${html}</div></div>`;
  setTimeout(()=>document.querySelectorAll('.srw input').forEach(i=>i.addEventListener('blur',()=>setTimeout(()=>{if(S.modal){S.modal.sl=false;rM()}},200))),50);
}
